<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOF Validator — Internet Ontology Framework</title>
<style>
:root {
  --bg:#f0f2f5; --surface:#ffffff; --border:#d0d7de; --muted:#6e7781; --fg:#1a1d21;
  --gov:#1a56db; --policy:#7c3aed; --domain:#0d7a4e; --region:#b45309;
  --analysis:#4b5563; --ok:#16a34a; --warn:#ca8a04; --err:#dc2626;
  --hover-bg:#eef4ff; --focus-ring:0 0 0 3px rgba(26,86,219,0.35);
  --header-h:62px; --radius:8px;
  --fs:15px; --fs-sm:13px; --fs-xs:12px;
}
@media(prefers-color-scheme:dark){
  :root{ --bg:#0d1117; --surface:#161b22; --border:#30363d; --muted:#8b949e; --fg:#e6edf3;
    --gov:#58a6ff; --policy:#c084fc; --domain:#3fb950; --region:#f0883e;
    --analysis:#9ca3af; --ok:#3fb950; --warn:#d29922; --err:#f85149; --hover-bg:#1c2433; }
}
*,*::before,*::after{box-sizing:border-box;}
html{font-size:var(--fs);}
body{margin:0;font-family:system-ui,-apple-system,sans-serif;font-size:var(--fs);line-height:1.55;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;}
button,select{font-family:inherit;font-size:var(--fs-sm);cursor:pointer;border-radius:var(--radius);}
button:focus-visible,select:focus-visible{outline:none;box-shadow:var(--focus-ring);}

/* HEADER */
header{position:sticky;top:0;z-index:100;height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px;flex-wrap:nowrap;}
.hbrand{display:flex;align-items:center;gap:8px;margin-right:4px;flex-shrink:0;}
.hbrand .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#1a56db,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbrand h1{font-size:15px;font-weight:600;letter-spacing:-0.02em;margin:0;line-height:1.1;}
.hbrand .sub{font-size:11px;color:var(--muted);line-height:1;}
.hsep{width:1px;height:26px;background:var(--border);flex-shrink:0;}
select#govSel{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:5px 9px;border-radius:var(--radius);min-width:180px;max-width:250px;font-size:var(--fs-sm);}

/* BUTTONS */
.btn{border:none;padding:6px 14px;font-weight:600;font-size:var(--fs-sm);border-radius:var(--radius);display:flex;align-items:center;gap:5px;transition:opacity 0.15s;white-space:nowrap;flex-shrink:0;}
.btn:disabled{opacity:0.4;cursor:default;}
.btn-primary{background:var(--gov);color:#fff;}
.btn-primary:not(:disabled):hover{opacity:0.85;}
.btn-deep{background:#0d7a4e;color:#fff;}
.btn-deep:not(:disabled):hover{opacity:0.85;}
.btn-export{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;}
.btn-export:not(:disabled):hover{opacity:0.9;}
.btn-ghost{background:var(--bg);border:1px solid var(--border);color:var(--fg);}
.btn-ghost:hover{background:var(--hover-bg);border-color:var(--gov);}
.spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.running .spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* COLOUR STATE BADGE */
.colour-badge{display:none;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:var(--fs-xs);font-weight:700;letter-spacing:.04em;border:1px solid transparent;flex-shrink:0;}
.colour-badge.visible{display:flex;}
.cb-BLU{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8;}
.cb-GRN{background:#f0fdf4;border-color:#86efac;color:#15803d;}
.cb-AMB{background:#fefce8;border-color:#fde047;color:#854d0e;}
.cb-RED{background:#fef2f2;border-color:#fca5a5;color:#991b1b;}
@media(prefers-color-scheme:dark){
  .cb-BLU{background:#0c1a3a;border-color:#1e3a6e;color:#93c5fd;}
  .cb-GRN{background:#052e16;border-color:#166534;color:#4ade80;}
  .cb-AMB{background:#1c1400;border-color:#854d0e;color:#fde047;}
  .cb-RED{background:#2d0f0f;border-color:#991b1b;color:#fca5a5;}
}

/* FONT CONTROL */
.fctr{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.fctr button{background:var(--bg);border:1px solid var(--border);color:var(--fg);width:26px;height:26px;padding:0;font-size:13px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.fctr button:hover{background:var(--hover-bg);}
.fctr span{font-size:var(--fs-xs);color:var(--muted);min-width:22px;text-align:center;}

/* COUNTERS */
.counters{display:flex;gap:5px;margin-left:auto;flex-shrink:0;}
.pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:var(--fs-xs);font-weight:600;border:1px solid transparent;}
.pill-ok  {background:#f0fdf4;border-color:#86efac;color:#15803d;}
.pill-warn{background:#fefce8;border-color:#fde047;color:#854d0e;}
.pill-err {background:#fef2f2;border-color:#fca5a5;color:#991b1b;}
@media(prefers-color-scheme:dark){
  .pill-ok  {background:#052e16;border-color:#166534;color:#4ade80;}
  .pill-warn{background:#1c1400;border-color:#854d0e;color:#fde047;}
  .pill-err {background:#2d0f0f;border-color:#991b1b;color:#fca5a5;}}

/* MENU */
.menu{position:relative;flex-shrink:0;}
.menu-btn{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:5px 9px;font-size:16px;line-height:1;}
.menu-panel{display:none;position:absolute;right:0;top:calc(100% + 5px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);padding:8px;min-width:220px;z-index:200;}
.menu.open .menu-panel{display:block;}
.msect{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:6px 6px 4px;}
.macts{display:flex;gap:5px;padding:3px 0;}
.macts button{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:5px 0;font-size:var(--fs-xs);border-radius:5px;}
.macts button:hover{background:var(--hover-bg);border-color:var(--gov);}
.mdiv{height:1px;background:var(--border);margin:7px 0;}
.ftree{padding:0 2px;}
.fi{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;cursor:pointer;user-select:none;}
.fi:hover{background:var(--hover-bg);}
.fi input[type=checkbox]{width:14px;height:14px;accent-color:var(--gov);cursor:pointer;flex-shrink:0;}
.fd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fi span{font-size:var(--fs-sm);}
.fc1{margin-left:20px;}
.fc2{margin-left:38px;}
.fi.disabled{opacity:.4;pointer-events:none;}

/* LAYOUT */
.container{display:flex;height:calc(100vh - var(--header-h));overflow:hidden;position:relative;}
.resizer{width:5px;flex-shrink:0;cursor:col-resize;background:var(--border);transition:background .15s;position:relative;z-index:10;}
.resizer:hover,.resizer.dragging{background:var(--gov);}
.resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:32px;border-radius:2px;background:var(--muted);opacity:.4;}
.tree-pane{overflow-y:auto;overflow-x:hidden;padding:14px;min-width:180px;}
.insp-pane{background:var(--surface);display:flex;flex-direction:column;overflow:hidden;min-width:160px;}
.insp-hdr{padding:9px 13px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.lock-badge{font-size:10px;background:var(--hover-bg);border:1px solid var(--border);padding:1px 7px;border-radius:20px;color:var(--gov);display:none;}
.lock-badge.visible{display:block;}
.insp-body{flex:1;overflow-y:auto;padding:11px 13px;}
.insp-empty{color:var(--muted);font-size:var(--fs-sm);font-style:italic;}

/* TREE */
.node-wrap{margin:1px 0;}
.node-hdr{display:flex;align-items:center;padding:3px 5px 3px 1px;border-radius:6px;cursor:default;position:relative;}
.node-hdr:focus-visible{outline:none;box-shadow:var(--focus-ring);}
.chev{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0;cursor:pointer;color:var(--muted);transition:transform .15s;font-size:10px;user-select:none;}
.chev:hover{background:var(--border);color:var(--fg);}
.chev.open{transform:rotate(90deg);}
.chev.leaf{visibility:hidden;cursor:default;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin:0 5px 0 2px;}
.dot-ok  {background:var(--ok);}
.dot-warn{background:var(--warn);}
.dot-err {background:var(--err);}
.dot-dead{background:#94a3b8;}
.chip{font-size:10px;font-weight:700;letter-spacing:.04em;padding:1px 5px;border-radius:3px;margin-right:5px;flex-shrink:0;text-transform:uppercase;border:1px solid transparent;}
.chip-gov     {color:var(--gov);    background:#eef4ff;border-color:#c3d9f9;}
.chip-policy  {color:var(--policy); background:#f5f0ff;border-color:#d8c4fd;}
.chip-domain  {color:var(--domain); background:#f0fdf4;border-color:#86efac;}
.chip-region  {color:var(--region); background:#fffbeb;border-color:#fde68a;}
.chip-analysis{color:var(--analysis);background:#f3f4f6;border-color:#d1d5db;}
.chip-url     {color:#0369a1;       background:#f0f9ff;border-color:#bae6fd;}
.chip-url.dead{color:#64748b;background:#f1f5f9;border-color:#cbd5e1;}
@media(prefers-color-scheme:dark){
  .chip-gov     {background:#0c1a3a;border-color:#1e3a6e;}
  .chip-policy  {background:#1c0a3a;border-color:#4c1d95;}
  .chip-domain  {background:#052e16;border-color:#166534;}
  .chip-region  {background:#1c1400;border-color:#7c4f0a;}
  .chip-analysis{background:#1a1d21;border-color:#30363d;}
  .chip-url     {background:#0a1e2e;border-color:#0369a1;}
  .chip-url.dead{background:#1a1d21;border-color:#30363d;}}
.nlbl{font-size:var(--fs-sm);color:var(--fg);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.nlbl:hover{text-decoration:underline;}
.url-badge{font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px;font-weight:600;flex-shrink:0;}
.ub-ok  {color:var(--ok);  background:#f0fdf4;border:1px solid #86efac;}
.ub-err {color:var(--err); background:#fef2f2;border:1px solid #fca5a5;}
.ub-chk {color:var(--muted);background:var(--bg);border:1px solid var(--border);}
.scope-tag{font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px;flex-shrink:0;font-weight:600;border:1px solid transparent;}
.sg{color:#0369a1;background:#f0f9ff;border-color:#bae6fd;}
.sc{color:var(--region);background:#fffbeb;border-color:#fde68a;}
@media(prefers-color-scheme:dark){.sg{background:#0a1e2e;border-color:#0369a1;}.sc{background:#1c1400;border-color:#7c4f0a;}}
.success-badge{display:none;align-items:center;gap:4px;font-size:var(--fs-xs);font-weight:600;color:var(--ok);background:#f0fdf4;border:1px solid #86efac;border-radius:20px;padding:2px 9px;margin-left:7px;flex-shrink:0;}
.success-badge.visible{display:flex;}
@media(prefers-color-scheme:dark){.success-badge{background:#052e16;border-color:#166534;}}
.node-hdr:hover{background:var(--hover-bg);}
.node-hdr.locked{background:#eef4ff;}
@media(prefers-color-scheme:dark){.node-hdr.locked{background:#0c1a3a;}}
.nchildren{margin-left:20px;border-left:1px dashed var(--border);padding-left:5px;}
.nchildren.collapsed{display:none;}

/* INSPECTOR */
pre{font-family:'SF Mono','Cascadia Code','Fira Code',monospace;font-size:var(--fs-xs);line-height:1.6;margin:0;white-space:pre-wrap;word-break:break-all;color:var(--fg);}
.hl-key {color:var(--policy);}
.hl-str {color:var(--domain);}
.hl-num {color:var(--gov);}
.hl-bool{color:var(--analysis);font-style:italic;}
.hl-null{color:var(--muted);font-style:italic;}
.hl-foc {background:#fff3cd;border-radius:2px;padding:0 2px;font-weight:600;}
@media(prefers-color-scheme:dark){.hl-foc{background:#3d2e00;}}
.issue-list{margin:0 0 10px;padding:0;list-style:none;}
.issue-item{display:flex;gap:6px;padding:4px 7px;border-radius:4px;font-size:var(--fs-sm);margin-bottom:3px;}
.issue-warn{background:#fefce8;border-left:3px solid var(--warn);}
.issue-err {background:#fef2f2;border-left:3px solid var(--err);}
@media(prefers-color-scheme:dark){.issue-warn{background:#1c1400;}.issue-err{background:#2d0f0f;}}

/* MISSION PANEL */
.mission-bar{display:none;background:linear-gradient(135deg,#1e3a5f,#2d1b6e);border-top:1px solid #3b5a8a;padding:10px 16px;flex-shrink:0;align-items:center;gap:12px;}
.mission-bar.visible{display:flex;}
.mission-info{flex:1;color:#e0e7ff;font-size:var(--fs-sm);}
.mission-info strong{display:block;font-size:14px;letter-spacing:-.01em;color:#fff;}
.mission-info span{font-size:var(--fs-xs);opacity:.75;}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;padding:40px;}
.empty-state .icon{width:50px;height:50px;border-radius:12px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
.empty-state p{margin:0;font-size:var(--fs-sm);}

/* DEEP VALIDATE PROGRESS */
.progress-bar{height:3px;background:var(--border);position:relative;overflow:hidden;display:none;}
.progress-bar.visible{display:block;}
.progress-fill{height:100%;background:var(--gov);transition:width .2s;width:0%;}
</style>
</head>
<body>

<header role="banner">
  <div class="hbrand">
    <div class="logo" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="4" r="2.5" fill="white" opacity=".9"/>
        <circle cx="3" cy="12" r="2" fill="white" opacity=".7"/>
        <circle cx="13" cy="12" r="2" fill="white" opacity=".7"/>
        <line x1="8" y1="6.5" x2="3.8" y2="10.2" stroke="white" stroke-width="1.2" opacity=".6"/>
        <line x1="8" y1="6.5" x2="12.2" y2="10.2" stroke="white" stroke-width="1.2" opacity=".6"/>
      </svg>
    </div>
    <div><h1>IOF Validator</h1><div class="sub">Internet Ontology Framework</div></div>
  </div>

  <div class="hsep" aria-hidden="true"></div>

  <label for="govSel" style="position:absolute;left:-9999px">Governance profile</label>
  <select id="govSel" aria-label="Select governance profile"></select>

  <button id="runBtn" class="btn btn-primary" onclick="startValidate()" aria-label="Structural validate">
    <div class="spinner" aria-hidden="true"></div><span id="runLbl">Validate</span>
  </button>

  <button id="deepBtn" class="btn btn-deep" onclick="startDeepValidate()" disabled aria-label="Deep validate — check URL reachability">
    <div class="spinner" aria-hidden="true"></div><span id="deepLbl">Deep Validate</span>
  </button>

  <button id="exportBtn" class="btn btn-export" onclick="exportMission()" disabled aria-label="Export mission JSON">
    ⬇ Mission Export
  </button>

  <div class="colour-badge" id="colourBadge" aria-live="polite"></div>

  <div class="fctr" role="group" aria-label="Text size">
    <button onclick="adjFont(-1)" aria-label="Smaller text">A−</button>
    <span id="fsLbl" aria-live="polite">15</span>
    <button onclick="adjFont(1)"  aria-label="Larger text">A+</button>
  </div>

  <div class="counters" role="status" aria-live="polite">
    <div class="pill pill-ok"  ><svg width="7" height="7" viewBox="0 0 7 7" aria-hidden="true"><circle cx="3.5" cy="3.5" r="3.5" fill="currentColor"/></svg><b id="okCnt">—</b></div>
    <div class="pill pill-warn"><svg width="7" height="7" viewBox="0 0 7 7" aria-hidden="true"><circle cx="3.5" cy="3.5" r="3.5" fill="currentColor"/></svg><b id="warnCnt">—</b></div>
    <div class="pill pill-err" ><svg width="7" height="7" viewBox="0 0 7 7" aria-hidden="true"><circle cx="3.5" cy="3.5" r="3.5" fill="currentColor"/></svg><b id="errCnt">—</b></div>
  </div>

  <div class="menu" id="menu">
    <button class="btn btn-ghost menu-btn" onclick="toggleMenu()" aria-expanded="false" aria-controls="menuPanel" aria-label="Options">⋯</button>
    <div class="menu-panel" id="menuPanel" role="menu">
      <div class="msect">Tree</div>
      <div class="macts">
        <button onclick="expandAll()"   role="menuitem">Expand all</button>
        <button onclick="collapseAll()" role="menuitem">Collapse all</button>
        <button onclick="focusErrors()" role="menuitem">Focus errors</button>
      </div>
      <div class="mdiv"></div>
      <div class="msect">Filters</div>
      <div class="ftree" role="group" aria-label="Filters">
        <label class="fi">
          <input type="checkbox" checked data-filter="gov" onchange="handleFilter(this)">
          <span class="fd" style="background:var(--gov)"></span><span>Governance</span>
        </label>
        <label class="fi fc1" id="fi-policy">
          <input type="checkbox" checked data-filter="policy" data-parent="gov" onchange="handleFilter(this)">
          <span class="fd" style="background:var(--policy)"></span><span>Policies</span>
        </label>
        <label class="fi fc2" id="fi-domain">
          <input type="checkbox" checked data-filter="domain" data-parent="policy" onchange="handleFilter(this)">
          <span class="fd" style="background:var(--domain)"></span><span>Domains</span>
        </label>
        <label class="fi fc2" id="fi-region">
          <input type="checkbox" checked data-filter="region" data-parent="policy" onchange="handleFilter(this)">
          <span class="fd" style="background:var(--region)"></span><span>Regions</span>
        </label>
        <label class="fi fc2" id="fi-analysis">
          <input type="checkbox" checked data-filter="analysis" data-parent="policy" onchange="handleFilter(this)">
          <span class="fd" style="background:var(--analysis)"></span><span>Analysis</span>
        </label>
      </div>
    </div>
  </div>
</header>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="container" id="container">
  <div class="tree-pane" id="treePane" role="tree" aria-label="Ontology tree" style="width:55%">
    <div class="empty-state" id="emptyState">
      <div class="icon" aria-hidden="true">🌐</div>
      <p>Select a governance profile and click <strong>Validate</strong> to inspect the ontology tree.</p>
    </div>
  </div>

  <div class="resizer" id="resizer" role="separator" tabindex="0" aria-label="Resize panels"></div>

  <aside class="insp-pane" id="inspPane" aria-label="Node inspector" style="flex:1">
    <div class="insp-hdr">
      <span>Inspector</span>
      <span class="lock-badge" id="lockBadge">Locked</span>
    </div>
    <div class="insp-body" id="inspector">
      <div class="insp-empty">Hover over a node to inspect · Click to lock</div>
    </div>
  </aside>
</div>

<script>
'use strict';

/* ═══ STATE ═══════════════════════════════════════════════════════════ */
let FILE_INDEX = [];
let JSON_CACHE = {};
let LOCKED_EL  = null;
let COUNTS     = {ok:0,warn:0,err:0};
let STATE      = 'idle'; // idle | structural | deep | rft
let MISSION    = null;   // resolved mission data after deep validate
let curFS      = 15;

/* ═══ FONT SIZE ════════════════════════════════════════════════════════ */
function adjFont(d) {
  curFS = Math.min(22, Math.max(12, curFS+d));
  document.documentElement.style.setProperty('--fs',    curFS+'px');
  document.documentElement.style.setProperty('--fs-sm', (curFS-2)+'px');
  document.documentElement.style.setProperty('--fs-xs', (curFS-3)+'px');
  document.getElementById('fsLbl').textContent = curFS;
}

/* ═══ RESIZER ══════════════════════════════════════════════════════════ */
(function(){
  const r=document.getElementById('resizer'),t=document.getElementById('treePane'),c=document.getElementById('container');
  let drag=false,sx=0,sw=0;
  r.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sw=t.getBoundingClientRect().width;r.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
  document.addEventListener('mousemove',e=>{if(!drag)return;const cw=c.getBoundingClientRect().width;t.style.width=Math.min(cw-160,Math.max(180,sw+(e.clientX-sx)))+'px';});
  document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;r.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';});
  r.addEventListener('keydown',e=>{const cw=c.getBoundingClientRect().width,cw2=t.getBoundingClientRect().width;if(e.key==='ArrowLeft')t.style.width=Math.max(180,cw2-20)+'px';if(e.key==='ArrowRight')t.style.width=Math.min(cw-160,cw2+20)+'px';});
})();

/* ═══ UTILS ════════════════════════════════════════════════════════════ */
function getType(p){
  if(!p)return'';
  if(p.includes('governance'))return'gov';
  if(p.includes('policies'))return'policy';
  if(p.includes('regions'))return'region';
  if(p.includes('analysis'))return'analysis';
  if(p.includes('domains'))return'domain';
  if(p.startsWith('http'))return'url';
  return'';
}
function typeLabel(t){return{gov:'GOV',policy:'POLICY',domain:'DOMAIN',region:'REGION',analysis:'ANALYSIS',url:'URL','':''}[t]||'';}
function shortLabel(p){
  if(!p)return'—';
  if(p.startsWith('http')){try{return new URL(p).hostname;}catch{return p;}}
  const pts=p.split('/'),f=pts[pts.length-1].replace('.json',''),par=pts[pts.length-2]||'';
  if(f==='global'||f==='*')return par+'/'+f;
  return f;
}
async function loadJSON(p){
  if(JSON_CACHE[p])return JSON_CACHE[p];
  try{const r=await fetch(p,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();JSON_CACHE[p]=j;return j;}
  catch(e){return{__error:true,path:p,message:e.message};}
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nodeStatus(el){if(el.querySelector('.dot-err'))return'err';if(el.querySelector('.dot-warn'))return'warn';return'ok';}

/* ═══ URL CHECK (no-cors HEAD) ════════════════════════════════════════ */
async function checkUrl(url) {
  try {
    const r = await fetch(url, {method:'HEAD', mode:'no-cors', cache:'no-store'});
    return r.type === 'opaque' || r.ok;
  } catch { return false; }
}

/* ═══ MATCH RESOLVER ══════════════════════════════════════════════════
   Supported ops: equals, in, not-in, intersects, regex, count-gte, count-lte
   $regions → resolved country list from policy.what.regions
═══════════════════════════════════════════════════════════════════════ */
const SAFE_REGEX = /^[\w\^\$\(\)\|\.\*\+\?\[\]\-]{1,80}$/;

function safeRegex(pattern) {
  if (!SAFE_REGEX.test(pattern)) throw new Error('Unsafe regex pattern: ' + pattern);
  return new RegExp(pattern);
}

function resolveValue(val, ctx) {
  if (val === '$regions') return ctx.regionCountries || [];
  if (typeof val === 'string' && val.startsWith('$regions.')) {
    const code = val.split('.')[1];
    return (ctx.regionFiles || []).find(r => r.region === code)?.countries || [];
  }
  return val;
}

function evalPredicate(dj, pred, ctx) {
  const fieldPath = pred.field.split('.');
  let val = dj;
  for (const seg of fieldPath) {
    if (seg.endsWith(']')) {
      const name = seg.slice(0, seg.indexOf('['));
      const idx  = parseInt(seg.slice(seg.indexOf('[')+1));
      val = val?.[name]?.[idx];
    } else { val = val?.[seg]; }
  }

  const resolved = resolveValue(pred.value, ctx);

  switch (pred.op) {
    case 'equals':
      if (resolved === '*') return Array.isArray(val) && val[0] === '*';
      return val === resolved;
    case 'in':
      return resolved.includes(val);
    case 'not-in':
      if (Array.isArray(val)) return !val.some(v => resolved.includes(v));
      return !resolved.includes(val);
    case 'intersects':
      if (!Array.isArray(val)) return false;
      if (val[0] === '*') return true;
      return val.some(v => resolved.includes(v));
    case 'regex':
      try { return safeRegex(resolved).test(String(val||'')); }
      catch(e) { console.warn(e.message); return false; }
    case 'count-gte':
      return Array.isArray(val) && val.length >= resolved;
    case 'count-lte':
      return Array.isArray(val) && val.length <= resolved;
    default:
      console.warn('Unknown op:', pred.op);
      return false;
  }
}

async function resolveMatchDomains(matchDef, pj) {
  // Resolve $regions → collect all countries from region files
  const regionCountries = [];
  const regionFiles = [];
  for (const rPath of (pj.what?.regions || [])) {
    const rj = await loadJSON(rPath);
    if (!rj.__error && rj.countries) {
      regionFiles.push(rj);
      regionCountries.push(...rj.countries);
    }
  }
  const ctx = { regionCountries: [...new Set(regionCountries)], regionFiles };

  const predicates = matchDef.match || [];
  const logic = (pj.selection?.matchLogic || 'AND').toUpperCase();

  return FILE_INDEX.filter(f => f.includes('/domains/')).filter(f => {
    const dj = JSON_CACHE[f];
    if (!dj || dj.__error) return false;
    if (logic === 'AND') return predicates.every(p => evalPredicate(dj, p, ctx));
    return predicates.some(p => evalPredicate(dj, p, ctx));
  });
}

/* ═══ VALIDATION ═══════════════════════════════════════════════════════ */
function worstStatus(issues){if(issues.some(i=>i.level==='err'))return'err';if(issues.some(i=>i.level==='warn'))return'warn';return'ok';}

function validateGovernance(g){
  const i=[];
  if(!g.id)   i.push({level:'warn',msg:'Missing "id"'});
  if(!g.name) i.push({level:'warn',msg:'Missing "name"'});
  if(!g.rational) i.push({level:'warn',msg:'Missing "rational" — governance purpose undocumented'});
  if(!g.controls?.length) i.push({level:'warn',msg:'Missing "controls" — no control objectives defined'});
  if(!g.standard) i.push({level:'warn',msg:'Missing "standard" — no compliance reference'});
  if(!g.requirements?.length) i.push({level:'warn',msg:'Missing "requirements" — no traceability'});
  if(!Array.isArray(g.policies)) i.push({level:'err',msg:'"policies" array is required'});
  else if(!g.policies.length)    i.push({level:'warn',msg:'"policies" is empty'});
  return i;
}
function validatePolicy(p){
  const i=[];
  if(!p.id) i.push({level:'warn',msg:'Missing "id"'});
  if(!p.what) { i.push({level:'err',msg:'"what" is required'}); return i; }
  const hd = p.what.domains && (Array.isArray(p.what.domains) ? p.what.domains.length : p.what.domains.match);
  const hr = p.what.regions?.length;
  if(!hd&&!hr) i.push({level:'err',msg:'"what.domains" or "what.regions" must be defined'});
  if(p.what.domains && !Array.isArray(p.what.domains) && !p.what.domains.match)
    i.push({level:'err',msg:'"what.domains" must be array or object with "match"'});
  if(!p.how?.length) i.push({level:'err',msg:'"how" array is required'});
  return i;
}
function validateDomainNode(d){
  const i=[];
  if(!d.domain)    i.push({level:'warn',msg:'Missing "domain" field'});
  if(!d.countries) i.push({level:'warn',msg:'Missing "countries" — excluded from region-views'});
  if(!d.nodes)              i.push({level:'err', msg:'Missing "nodes" array'});
  else if(!d.nodes.length)  i.push({level:'warn',msg:'"nodes" array is empty'});
  else d.nodes.forEach(u=>{
    if(typeof u!=='string') i.push({level:'err',msg:'Node not a string: '+JSON.stringify(u)});
    else if(!u.startsWith('http')) i.push({level:'warn',msg:`"${u}" does not start with http`});
  });
  return i;
}
function validateRegion(r){
  const i=[];
  if(!r.region)  i.push({level:'warn',msg:'Missing "region" code'});
  if(!r.name)    i.push({level:'warn',msg:'Missing "name"'});
  if(!r.countries?.length) i.push({level:'warn',msg:'"countries" is empty or missing'});
  return i;
}
function validateAnalysis(a){
  const i=[];
  if(!a.id)      i.push({level:'warn',msg:'Missing "id"'});
  if(!a.weights) i.push({level:'warn',msg:'Missing "weights"'});
  if(!a.latency) i.push({level:'warn',msg:'Missing "latency" thresholds'});
  return i;
}

/* ═══ NODE BUILDER ═════════════════════════════════════════════════════ */
function mkNode({label,status,json,issues,children,isRoot,isLeaf,scopeTag,urlStatus}) {
  const type = getType(label);
  const wrap = document.createElement('div');
  wrap.className = 'node-wrap';
  wrap.dataset.type = type;
  if(label) wrap.dataset.label = label;
  COUNTS[status]++;

  const h = document.createElement('div');
  h.className = 'node-hdr';
  h.tabIndex = 0;
  h.setAttribute('role','treeitem');
  h.setAttribute('aria-expanded','true');

  const chev = document.createElement('span');
  chev.className = 'chev' + (isLeaf?' leaf':' open');
  chev.textContent = '▶';
  chev.setAttribute('aria-hidden','true');

  const dot = document.createElement('span');
  dot.className = 'dot dot-'+status;
  dot.setAttribute('aria-label',status);

  const chip = document.createElement('span');
  chip.className = 'chip chip-'+(type||'analysis');
  if(type==='url' && urlStatus==='dead') chip.classList.add('dead');
  chip.textContent = typeLabel(type);
  if(!typeLabel(type)) chip.style.display='none';

  const lbl = document.createElement('span');
  lbl.className = 'nlbl';
  lbl.textContent = shortLabel(label);
  lbl.title = label;

  h.append(chev, dot, chip, lbl);

  if(scopeTag) {
    const st = document.createElement('span');
    st.className = 'scope-tag '+(scopeTag==='★ global'?'sg':'sc');
    st.textContent = scopeTag;
    h.appendChild(st);
  }

  if(type==='url' && urlStatus) {
    const ub = document.createElement('span');
    ub.className = 'url-badge ' + (urlStatus==='ok'?'ub-ok':urlStatus==='err'?'ub-err':'ub-chk');
    ub.textContent = urlStatus==='ok'?'✓ UP':urlStatus==='err'?'✗ DOWN':'…';
    ub.id = 'ub-'+encodeURIComponent(label);
    h.appendChild(ub);
  }

  if(isRoot) {
    const b = document.createElement('span');
    b.className = 'success-badge';
    b.id = 'successBadge';
    b.textContent = '✓ Structural RFT';
    h.appendChild(b);
  }

  const body = document.createElement('div');
  body.className = 'nchildren'+(status==='ok'&&!isRoot?' collapsed':'');
  children.forEach(c=>body.appendChild(c));
  wrap.append(h,body);

  chev.addEventListener('click',e=>{e.stopPropagation();const col=body.classList.toggle('collapsed');chev.classList.toggle('open',!col);h.setAttribute('aria-expanded',String(!col));});
  h.addEventListener('click',e=>{if(e.target===chev)return;lockInspector(json,label,issues,h);});
  h.addEventListener('mouseenter',()=>{if(!LOCKED_EL)showInspector(json,label,issues);});
  h.addEventListener('keydown',e=>{if(e.key==='Enter')lockInspector(json,label,issues,h);if(e.key===' '){e.preventDefault();chev.click();}});
  return wrap;
}

function lockInspector(json,label,issues,el){
  if(LOCKED_EL)LOCKED_EL.classList.remove('locked');
  LOCKED_EL=el; el.classList.add('locked');
  document.getElementById('lockBadge').classList.add('visible');
  showInspector(json,label,issues);
}
function showInspector(json,label,issues){
  const el=document.getElementById('inspector');
  let h='';
  if(issues?.length){
    h+='<ul class="issue-list">';
    issues.forEach(i=>h+=`<li class="issue-item issue-${i.level}"><span>${i.level==='err'?'✕':'⚠'}</span><span>${escH(i.msg)}</span></li>`);
    h+='</ul>';
  }
  h+='<pre>'+synHL(json,label)+'</pre>';
  el.innerHTML=h;
}
function synHL(json,focus){
  const str=JSON.stringify(json,null,2);
  const foc=focus?focus.split('/').pop().replace('.json',''):null;
  return str.split('\n').map(line=>{
    let h=escH(line);
    h=h.replace(/"([^"]+)":/g,'<span class="hl-key">"$1"</span>:');
    h=h.replace(/: "([^"]*)"/g,': <span class="hl-str">"$1"</span>');
    h=h.replace(/: (-?\d+\.?\d*)/g,': <span class="hl-num">$1</span>');
    h=h.replace(/: (true|false)/g,': <span class="hl-bool">$1</span>');
    h=h.replace(/: (null)/g,': <span class="hl-null">$1</span>');
    if(foc&&foc!=='*'&&foc.length>2){const e=foc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');h=h.replace(new RegExp(e,'gi'),m=>`<span class="hl-foc">${m}</span>`);}
    return h;
  }).join('\n');
}
document.body.addEventListener('click',e=>{
  if(!e.target.closest('.node-hdr')&&!e.target.closest('.insp-pane')){
    if(LOCKED_EL)LOCKED_EL.classList.remove('locked');

});

function handleFilter(cb){
  const type=cb.dataset.filter,parent=cb.dataset.parent;
  if(parent){const pc=document.querySelector(`[data-filter="${parent}"]`);if(pc&&!pc.checked){cb.checked=false;return;}}
  applyFilter(type,cb.checked);
  if(!cb.checked){document.querySelectorAll(`[data-parent="${type}"]`).forEach(c=>{c.checked=false;document.getElementById('fi-'+c.dataset.filter)?.classList.add('disabled');applyFilter(c.dataset.filter,false);});}
  else{document.querySelectorAll(`[data-parent="${type}"]`).forEach(c=>document.getElementById('fi-'+c.dataset.filter)?.classList.remove('disabled'));}
}

/* ═══ CORE BUILD ═══════════════════════════════════════════════════════ */
async function buildTree(govFile) {
  COUNTS = {ok:0,warn:0,err:0};
  const gov = await loadJSON(govFile);
  const govI = gov.__error ? [{level:'err',msg:'Cannot load: '+(gov.message||govFile)}] : validateGovernance(gov);
  const pNodes = [];

  for (const pPath of (gov.policies||[])) {
    const pj = await loadJSON(pPath);
    const pI = pj.__error ? [{level:'err',msg:'Cannot load: '+(pj.message||pPath)}] : validatePolicy(pj);
    const gNodes = [];

    // ── DOMAIN VIEW ──────────────────────────────────────────────
    if (pj.what?.domains) {
      const domainsVal = pj.what.domains;
      let files = [];

      if (Array.isArray(domainsVal)) {
        // Legacy: string array with glob patterns
        for (const pat of domainsVal) {
          const key = pat.replace('*','').replace('./','');
          files.push(...FILE_INDEX.filter(f => f.replace('./','').startsWith(key)));
        }
        files = [...new Set(files)];
      } else if (domainsVal.match) {
        // New: match object — pre-load all domain JSONs first
        const allDomainFiles = FILE_INDEX.filter(f=>f.includes('/domains/'));
        for (const f of allDomainFiles) await loadJSON(f); // warm cache
        files = await resolveMatchDomains(domainsVal, pj);
      }

      const fileNodes = [];
      for (const f of files) {
        const dj = await loadJSON(f);
        const dI = dj.__error ? [{level:'err',msg:'Cannot load: '+(dj.message||f)}] : validateDomainNode(dj);
        const dS = dj.__error ? 'err' : worstStatus(dI);
        const isGlob = dj.countries?.[0]==='*';
        const scopeTag = !dj.countries?null:isGlob?'★ global':dj.countries.join(' · ');
        const urlNodes = (dj.nodes||[]).map(url=>mkNode({label:url,status:'ok',json:{url},issues:[],children:[],isLeaf:true}));
        fileNodes.push(mkNode({label:f,status:dS,json:dj,issues:dI,children:urlNodes,scopeTag}));
      }

      if (Array.isArray(domainsVal)) {
        // Show pattern groups
        const patNodes = [];
        for (const pat of domainsVal) {
          const key = pat.replace('*','').replace('./','');
          const pFiles = files.filter(f=>f.replace('./','').startsWith(key));
          const pFileNodes = fileNodes.filter(n=>pFiles.includes(n.dataset.label));
          const pI2 = pFiles.length===0?[{level:'warn',msg:`No files matched "${pat}"`}]:[];
          const ps = worstStatus([...pI2,...pFileNodes.map(n=>({level:nodeStatus(n)}))]);
          patNodes.push(mkNode({label:pat,status:ps,json:{pattern:pat,matched:pFiles},issues:pI2,children:pFileNodes}));
        }
        const dgs = worstStatus(patNodes.map(n=>({level:nodeStatus(n)})));
        gNodes.push(mkNode({label:'./domains',status:dgs,json:{group:'domains'},issues:[],children:patNodes}));
      } else {
        // Match format — flat list under domains group
        const matchSummary = {matchPredicates: domainsVal.match, filesMatched: files.length};
        const dgs = worstStatus(fileNodes.map(n=>({level:nodeStatus(n)})));
        gNodes.push(mkNode({label:'./domains',status:dgs,json:matchSummary,issues:[],children:fileNodes}));
      }
    }

    // ── REGION VIEW ───────────────────────────────────────────────
    if (pj.what?.regions?.length) {
      const rNodes = [];
      for (const rPath of pj.what.regions) {
        const rj = await loadJSON(rPath);
        const rI = rj.__error ? [{level:'err',msg:'Cannot load: '+(rj.message||rPath)}] : validateRegion(rj);
        const rCCs = rj.countries||[];

        const allDomainFiles = FILE_INDEX.filter(f=>f.includes('/domains/'));
        const matchedNodes = [];
        for (const f of allDomainFiles) {
          const dj = await loadJSON(f);
          if(dj.__error) continue;
          if(!dj.countries) continue;
          const isGlob=dj.countries[0]==='*';
          const match=isGlob||dj.countries.some(c=>rCCs.includes(c));
          if(!match) continue;
          const dI=validateDomainNode(dj);
          const scopeTag=isGlob?'★ global':dj.countries.join(' · ');
          const urlNodes=(dj.nodes||[]).map(url=>mkNode({label:url,status:'ok',json:{url},issues:[],children:[],isLeaf:true}));
          matchedNodes.push(mkNode({label:f,status:worstStatus(dI),json:dj,issues:dI,children:urlNodes,scopeTag}));
        }

        const rNodeSt = rj.__error?'err':worstStatus([...rI,...matchedNodes.map(n=>({level:nodeStatus(n)}))]);
        rNodes.push(mkNode({label:rPath,status:rNodeSt,json:{...rj,_matched:matchedNodes.length+' files'},issues:rI,children:matchedNodes}));
      }
      const rgs=worstStatus(rNodes.map(n=>({level:nodeStatus(n)})));
      gNodes.push(mkNode({label:'./regions',status:rgs,json:{group:'regions'},issues:[],children:rNodes}));
    }

    // ── ANALYSIS ─────────────────────────────────────────────────
    if (pj.how?.length) {
      const aNs=[];
      for(const aP of pj.how){const aj=await loadJSON(aP);const aI=aj.__error?[{level:'err',msg:'Cannot load: '+(aj.message||aP)}]:validateAnalysis(aj);aNs.push(mkNode({label:aP,status:aj.__error?'err':worstStatus(aI),json:aj,issues:aI,children:[],isLeaf:true}));}
      const ags=worstStatus(aNs.map(n=>({level:nodeStatus(n)})));
      gNodes.push(mkNode({label:'./analysis',status:ags,json:{group:'analysis'},issues:[],children:aNs}));
    }

    const pS=pj.__error?'err':worstStatus([...pI,...gNodes.map(n=>({level:nodeStatus(n)}))]);
    pNodes.push(mkNode({label:pPath,status:pS,json:pj,issues:pI,children:gNodes}));
  }

  const gS=gov.__error?'err':worstStatus([...govI,...pNodes.map(n=>({level:nodeStatus(n)}))]);
  return mkNode({label:govFile,status:gS,json:gov,issues:govI,children:pNodes,isRoot:true});
}

  document.getElementById('runLbl').textContent='Validate';
}

/* ═══ DEEP VALIDATE ════════════════════════════════════════════════════ */
async function startDeepValidate() {
  const btn=document.getElementById('deepBtn');
  btn.disabled=true; btn.classList.add('running');
  document.getElementById('deepLbl').textContent='Checking URLs…';
  document.getElementById('exportBtn').disabled=true;
  STATE='deep';

  const urlNodes = [...document.querySelectorAll('[data-type="url"]')];
  const total=urlNodes.length;
  let done=0, failCount=0;
  const deadUrls=new Set();

  const pb=document.getElementById('progressBar');
  const pf=document.getElementById('progressFill');
  pb.classList.add('visible');

  // Batch checks — 5 concurrent
  const BATCH=5;
  for(let i=0;i<urlNodes.length;i+=BATCH){
    const batch=urlNodes.slice(i,i+BATCH);
    await Promise.all(batch.map(async wrap=>{
      const lbl=wrap.querySelector('.nlbl');
      const url=lbl?.title;
      if(!url||!url.startsWith('http'))return;
      const ub=document.getElementById('ub-'+encodeURIComponent(url));
      if(ub)ub.textContent='…';
      const alive=await checkUrl(url);
      done++;
      pf.style.width=Math.round((done/total)*100)+'%';
      const hdr=wrap.querySelector('.node-hdr');
      const dot=wrap.querySelector('.dot');
      if(!alive){
        failCount++;
        deadUrls.add(url);
        if(dot){dot.className='dot dot-err';}
        if(ub){ub.className='url-badge ub-err';ub.textContent='✗ DOWN';}
        expandPathTo(wrap);
      } else {
        if(dot)dot.className='dot dot-ok';
        if(ub){ub.className='url-badge ub-ok';ub.textContent='✓ UP';}
      }
    }));
  }

  pb.classList.remove('visible');
  pf.style.width='0%';

  const aliveCount=total-failCount;
  const pct=total>0?aliveCount/total:1;

  let colour='GRN',label='Full RFT';
  if(pct===1)       { colour='BLU'; label='Full RFT — 100% UP'; }
  else if(pct>=0.8) { colour='GRN'; label=`Full RFT — ${Math.round(pct*100)}% UP`; }
  else if(pct>=0.5) { colour='AMB'; label=`Degraded — ${Math.round(pct*100)}% UP`; }
  else              { colour='RED'; label=`NMC — ${Math.round(pct*100)}% UP`; }

  setColourState(colour, label);

  if(pct>=0.5) {
    STATE='rft';
    document.getElementById('exportBtn').disabled=false;
    // Build mission data
    MISSION = buildMissionData(deadUrls);
  } else {
    STATE='deep';
  }

  btn.disabled=false; btn.classList.remove('running');
  document.getElementById('deepLbl').textContent='Deep Validate';
}

/* ═══ MISSION DATA ═════════════════════════════════════════════════════ */
function buildMissionData(deadUrls) {
  const govFile = document.getElementById('govSel').value;
  const govId   = govFile.split('/').pop().replace('.json','');
  const ts      = new Date().toISOString();
  const missionId = `IOF-${ts.slice(0,10).replace(/-/g,'')}-${govId.toUpperCase().slice(0,8)}-${String(Date.now()).slice(-4)}`;

  const urlNodes = [...document.querySelectorAll('[data-type="url"]')];
  const resolvedNodes = [];
  const seenUrls = new Set();

  urlNodes.forEach(wrap=>{
    const url = wrap.querySelector('.nlbl')?.title;
    if(!url||!url.startsWith('http')||seenUrls.has(url))return;
    if(deadUrls.has(url))return; // exclude dead
    seenUrls.add(url);

    // Walk up tree to find domain node-file
    let domainWrap = wrap.parentElement?.closest('[data-type="domain"]');
    const domainFile = domainWrap?.dataset?.label||null;
    const dj = domainFile ? JSON_CACHE[domainFile] : null;

    resolvedNodes.push({
      url,
      domain: dj?.domain||null,
      countries: dj?.countries||null,
      sourceFile: domainFile
    });
  });

  const domains=[...new Set(resolvedNodes.map(n=>n.domain).filter(Boolean))];
  const badge=document.getElementById('colourBadge');
  const colourState=badge.textContent.split(' ')[0]||'GRN';

  return {
    missionId,
    created: ts,
    governance: govId,
    validatedBy: 'IOF Validator v3',
    colourState,
    status: 'RFT',
    coverage: {
      totalNodes: resolvedNodes.length,
      domains,
      nodeCount: resolvedNodes.length
    },
    resolvedNodes
  };
}

/* ═══ MISSION EXPORT ═══════════════════════════════════════════════════ */
function exportMission() {
  if(!MISSION)return;
  const json=JSON.stringify(MISSION,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=MISSION.missionId+'.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ═══ INIT ═════════════════════════════════════════════════════════════ */
async function init() {
  const idx=await loadJSON('./file-index.json');
  FILE_INDEX=(idx.files||[]);
  // Warm domain cache for match resolver
  for(const f of FILE_INDEX.filter(f=>f.includes('/domains/'))) await loadJSON(f);
  const sel=document.getElementById('govSel');
  FILE_INDEX.filter(f=>f.includes('governance')).forEach(g=>{
    const o=document.createElement('option');
    o.value=g; o.textContent=g.split('/').pop().replace('.json','');
    sel.appendChild(o);
  });
}

init();
</script>
