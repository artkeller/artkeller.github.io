<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOF Runtime</title>

<link rel="manifest" href="./manifest.json">

<style>
:root{
  --ok:#2ecc71; --warn:#f39c12; --err:#e74c3c;
}

body{font-family:system-ui;margin:0;}
header{padding:1rem;border-bottom:1px solid #ddd;display:flex;flex-wrap:wrap;gap:0.5rem;}
main{padding:1rem;}

.node{margin-left:1rem;border-left:1px dashed #ddd;padding-left:0.5rem;}
.node-header{display:flex;gap:0.5rem;cursor:pointer;}

.status{width:10px;height:10px;border-radius:50%;}
.ok{background:var(--ok);}
.warn{background:var(--warn);}
.err{background:var(--err);}

.hidden{display:none;}

.card{padding:0.3rem 0.6rem;border:1px solid #ddd;border-radius:6px;}
</style>
</head>

<body>

<header>
  <select id="govSelect"></select>
  <button onclick="start()">Run</button>

  <button onclick="expandAll()">Expand</button>
  <button onclick="collapseSmart()">Collapse</button>

  <button onclick="signCurrent()">Sign</button>
  <input type="file" id="uploadGov" accept=".json">

  <div class="card">OK:<span id="okCount">0</span></div>
  <div class="card">WARN:<span id="warnCount">0</span></div>
  <div class="card">ERR:<span id="errCount">0</span></div>

  <div class="card">TRUST:<span id="trustLevel">-</span></div>
</header>

<main>
  <div id="tree"></div>
</main>

<script>

/* =========================
 GLOBAL
========================= */

let FILE_INDEX=[];
let COUNTS={ok:0,warn:0,err:0};
let CURRENT_TREE=null;

/* =========================
 LOAD JSON (NO CACHE)
========================= */

async function loadJSON(path){
  try{
    const res = await fetch(path,{cache:"no-store"});
    if(!res.ok){
      return {__error:"HTTP_ERROR",status:res.status,path};
    }

    const text = await res.text();

    try{
      return JSON.parse(text);
    }catch(e){
      return {__error:"INVALID_JSON",msg:e.message,path};
    }

  }catch(e){
    return {__error:"NETWORK_ERROR",msg:e.message,path};
  }
}

/* =========================
 UTILS
========================= */

function issue(type,code,msg,ctx={}){ return {type,code,msg,...ctx}; }

function resolvePattern(pattern){
  const r=new RegExp("^"+pattern.replace(/\*/g,".*")+"$");
  return FILE_INDEX.filter(f=>r.test(f));
}

function agg(arr){
  if(arr.includes("err")) return "err";
  if(arr.includes("warn")) return "warn";
  return "ok";
}

/* =========================
 VALIDATION
========================= */

function validate(path,json){

  const issues=[];

  if(json.__error){
    issues.push(issue("err",json.__error,"Load failure",{path}));
    return issues;
  }

  if(path.includes("/policies/")){
    if(!json.what) issues.push(issue("err","POLICY_WHAT","missing what"));
    if(!json.how) issues.push(issue("err","POLICY_HOW","missing how"));
  }

  if(path.includes("/domains/")){
    if(!json.nodes) issues.push(issue("err","NODES","missing nodes"));

    if(Array.isArray(json.nodes)){
      json.nodes.forEach(u=>{
        try{ new URL(u); }
        catch{ issues.push(issue("warn","BAD_URL","invalid url",{url:u})); }
      });
    }
  }

  return issues;
}

/* =========================
 TREE UI
========================= */

function createNode(label,status,issues,children){

  const el=document.createElement("div");
  el.className="node";
  el.dataset.status=status;

  COUNTS[status]++;

  const h=document.createElement("div");
  h.className="node-header";

  const dot=document.createElement("div");
  dot.className="status "+status;

  const t=document.createElement("span");
  t.textContent=label;

  h.append(dot,t);

  const body=document.createElement("div");

  if(status==="ok") body.classList.add("hidden");

  h.onclick=()=>body.classList.toggle("hidden");

  issues.forEach(i=>{
    const d=document.createElement("div");
    d.innerHTML=`<b>${i.type}</b> [${i.code}] ${i.msg}`;
    d.style.color=i.type==="err"?"red":"orange";
    body.appendChild(d);
  });

  children.forEach(c=>body.appendChild(c));

  el.append(h,body);
  return el;
}

/* =========================
 EXPAND / COLLAPSE
========================= */

function expandAll(){
  document.querySelectorAll(".node > div:nth-child(2)")
    .forEach(n=>n.classList.remove("hidden"));
}

function collapseSmart(){

  const allGreen = COUNTS.err===0 && COUNTS.warn===0;

  document.querySelectorAll(".node").forEach(node=>{
    const body=node.children[1];
    const status=node.dataset.status;

    if(allGreen){
      body.classList.add("hidden");
    }else{
      if(status==="ok"){
        body.classList.add("hidden");
      }else{
        body.classList.remove("hidden");
      }
    }
  });
}

/* =========================
 HASH / SIGN
========================= */

function sortKeys(obj){
  if(Array.isArray(obj)) return obj.map(sortKeys);
  if(obj && typeof obj==="object"){
    return Object.keys(obj).sort().reduce((a,k)=>{
      a[k]=sortKeys(obj[k]); return a;
    },{});
  }
  return obj;
}

function canonicalize(obj){
  return JSON.stringify(sortKeys(obj));
}

async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function signCurrent(){

  if(!CURRENT_TREE){
    alert("run first"); return;
  }

  const hash=await sha256(canonicalize(CURRENT_TREE));

  const sig={
    governance:CURRENT_TREE.id||"custom",
    timestamp:new Date().toISOString(),
    treeHash:"sha256-"+hash,
    signedBy:prompt("name","user")
  };

  download(sig,"signature.json");
}

function download(obj,name){
  const blob=new Blob([JSON.stringify(obj,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

/* =========================
 PIPELINE
========================= */

async function run(govFile){

  COUNTS={ok:0,warn:0,err:0};

  const gov=await loadJSON(govFile);

  const policies=[];

  for(let p of gov.policies){

    const pj=await loadJSON(p);
    const issues=validate(p,pj);

    const domains=[];

    for(let pat of pj.what.domains){

      const files=resolvePattern(pat);
      const children=[];

      for(let f of files){

        const dj=await loadJSON(f);
        const dIssues=validate(f,dj);

        let urlStates=[];
        if(dj.nodes){
          for(let u of dj.nodes){
            try{ await fetch(u,{mode:"no-cors",cache:"no-store"}); urlStates.push("ok"); }
            catch{ urlStates.push("warn"); }
          }
        }

        const s=agg([...dIssues.map(i=>i.type),...urlStates]);

        children.push(createNode(f,s,dIssues,[]));
      }

      const s=agg(children.map(c=>c.dataset.status));
      domains.push(createNode(pat,s,[],children));
    }

    const ps=agg([...domains.map(d=>d.dataset.status),...issues.map(i=>i.type)]);
    policies.push(createNode(p,ps,issues,domains));
  }

  const rootStatus=agg(policies.map(p=>p.dataset.status));

  CURRENT_TREE={
    id:gov.id,
    policies:policies.length
  };

  return createNode(gov.id,rootStatus,[],policies);
}

/* =========================
 INIT
========================= */

async function init(){

  FILE_INDEX=(await loadJSON("./file-index.json")).files;

  const govs=FILE_INDEX.filter(f=>f.includes("governance-profiles"));

  const sel=document.getElementById("govSelect");

  govs.forEach(g=>{
    const o=document.createElement("option");
    o.value=g;
    o.textContent=g;
    sel.appendChild(o);
  });

  document.getElementById("uploadGov").addEventListener("change",async e=>{
    const f=e.target.files[0];
    const text=await f.text();
    const json=JSON.parse(text);
    CURRENT_TREE=json;
    alert("custom governance loaded");
  });
}

async function start(){
  const tree=document.getElementById("tree");
  tree.innerHTML="";

  const g=document.getElementById("govSelect").value;

  const t=await run(g);
  tree.appendChild(t);

  document.getElementById("okCount").textContent=COUNTS.ok;
  document.getElementById("warnCount").textContent=COUNTS.warn;
  document.getElementById("errCount").textContent=COUNTS.err;

  collapseSmart();
}

init();

</script>

</body>
</html>
