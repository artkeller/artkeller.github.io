<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Advanced QoS Monitoring</title>

<style>
body {
    font-family: Arial;
    background: #0d1117;
    color: #e6edf3;
    margin: 20px;
}

textarea, input {
    background: #161b22;
    color: #58a6ff;
    border: 1px solid #30363d;
    padding: 8px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    background: #238636;
    color: white;
    border: none;
}

canvas {
    background: #111;
    margin-top: 10px;
    border: 1px solid #333;
}

.good { color: #3fb950; }
.warn { color: #d29922; }
.bad  { color: #f85149; }

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td, th {
    border-bottom: 1px solid #30363d;
    padding: 6px;
}
</style>
</head>

<body>

<h2>🌐 Advanced QoS Monitoring Dashboard</h2>

<textarea id="urls">
https://example.com
https://jsonplaceholder.typicode.com/posts
</textarea><br>

<label>Parallel Requests:</label>
<input id="parallel" type="number" value="5">

<label>Interval (ms):</label>
<input id="interval" type="number" value="3000">

<label>Revenue / min ($):</label>
<input id="revenue" type="number" value="10000">

<br>
<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<canvas id="chart" width="800" height="200"></canvas>

<table>
<thead>
<tr>
<th>URL</th>
<th>p50</th>
<th>p95</th>
<th>p99</th>
<th>QoS</th>
<th>Tail</th>
<th>$/min Loss</th>
<th>Status</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let running = false;
let history = [];

async function measure(url) {
    const start = performance.now();
    try {
        await fetch(url, { cache: "no-store" });
    } catch {
        return null;
    }
    return performance.now() - start;
}

async function parallelRequests(url, count) {
    const promises = [];
    for (let i = 0; i < count; i++) {
        promises.push(measure(url));
    }
    const results = await Promise.all(promises);
    return results.filter(v => v !== null);
}

function percentile(arr, p) {
    const sorted = [...arr].sort((a,b)=>a-b);
    const i = Math.ceil(p * sorted.length) - 1;
    return sorted[Math.max(0,i)];
}

function analyze(lat) {
    const p50 = percentile(lat,0.5);
    const p95 = percentile(lat,0.95);
    const p99 = percentile(lat,0.99);

    const qos = Math.min(1, 200 / p95);
    const tail = p99 / p50;

    let status="Healthy", cls="good";
    if (tail>10) {status="Critical"; cls="bad";}
    else if (tail>5) {status="Warn"; cls="warn";}

    return {p50,p95,p99,qos,tail,status,cls};
}

function loss(revenue, latency) {
    const delta = Math.max(0, latency - 200);
    return revenue * (delta / 1000); // vereinfachtes Modell
}

function drawChart() {
    const c = document.getElementById("chart");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    if (history.length < 2) return;

    const max = Math.max(...history);

    ctx.beginPath();
    history.forEach((v,i)=>{
        const x = i * (c.width / history.length);
        const y = c.height - (v/max)*c.height;
        if (i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });
    ctx.strokeStyle="#58a6ff";
    ctx.stroke();
}

async function loop() {
    if (!running) return;

    const urls = document.getElementById("urls").value
        .split("\n").map(v=>v.trim()).filter(v=>v);

    const parallel = parseInt(document.getElementById("parallel").value);
    const revenue = parseFloat(document.getElementById("revenue").value);

    const table = document.getElementById("table");
    table.innerHTML="";

    for (let url of urls) {
        const lat = await parallelRequests(url, parallel);

        if (!lat.length) continue;

        const r = analyze(lat);
        const l = loss(revenue, r.p95);

        history.push(r.p95);
        if (history.length>50) history.shift();

        const row = `
        <tr>
            <td>${url}</td>
            <td>${r.p50.toFixed(1)}</td>
            <td>${r.p95.toFixed(1)}</td>
            <td>${r.p99.toFixed(1)}</td>
            <td>${r.qos.toFixed(2)}</td>
            <td>${r.tail.toFixed(2)}</td>
            <td>${l.toFixed(0)}</td>
            <td class="${r.cls}">${r.status}</td>
        </tr>`;

        table.innerHTML += row;
    }

    drawChart();

    const interval = parseInt(document.getElementById("interval").value);
    setTimeout(loop, interval);
}

function start() {
    running = true;
    loop();
}

function stop() {
    running = false;
}
</script>

</body>
</html>
