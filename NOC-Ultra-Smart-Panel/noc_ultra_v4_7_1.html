<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Ultra Smart v4.7.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-color: #e0e0e0;
            --accent-color: #00ff00;
            --danger-color: #ff3333;
            --warning-color: #ffcc00;
            --info-color: #0088ff; /* Das "Heilige" Blau */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Dashboard Grid */
        #monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .monitor-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            position: relative;
        }

        /* Status LEDs */
        .status-led {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-led.online { background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        .status-led.offline { background-color: var(--danger-color); box-shadow: 0 0 8px var(--danger-color); }
        .status-led.warning { background-color: var(--warning-color); box-shadow: 0 0 8px var(--warning-color); }
        .status-led.blue { background-color: var(--info-color); box-shadow: 0 0 8px var(--info-color); }

        /* Favoriten Canvas & Badges */
        .fav-led-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .instance-badge {
            position: absolute;
            bottom: -4px;
            right: -6px;
            background: #1a1a1a;
            color: var(--accent-color);
            font-size: 9px;
            font-weight: bold;
            padding: 1px 3px;
            border-radius: 3px;
            border: 1px solid #444;
            line-height: 1;
            z-index: 5;
        }

        .fav-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }
        .fav-btn.active { color: var(--warning-color); }
        .fav-btn:disabled {
            opacity: 0.2;
            filter: grayscale(100%);
            cursor: default;
            pointer-events: none;
        }

        #favorites-canvas {
            background: #111;
            border-left: 2px solid #333;
            padding: 15px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            width: 300px;
            overflow-y: auto;
        }

        .favorite-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="main-content" style="margin-right: 320px;">
        <div id="controls" style="margin-bottom: 20px;">
            <input type="text" id="nameInput" placeholder="Name">
            <input type="text" id="urlInput" placeholder="url (e.g. google.com)">
            <button onclick="addNewMonitor()">Hinzufügen</button>
        </div>
        <div id="monitor-grid"></div>
    </div>

    <div id="favorites-canvas">
        <h3><i class="fas fa-star"></i> Favoriten</h3>
        <div id="favorites-container"></div>
    </div>

<script>
    let monitors = JSON.parse(localStorage.getItem('monitors') || '[]');
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    function saveToStorage() {
        localStorage.setItem('monitors', JSON.stringify(monitors));
        localStorage.setItem('favorites', JSON.stringify(favorites));
    }

    function addNewMonitor() {
        const name = document.getElementById('nameInput').value.trim();
        let url = document.getElementById('urlInput').value.trim();

        if (!url) return;

        // Stabilisierung: Automatisches HTTPS-Schema
        if (!/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
        }

        const newMonitor = {
            id: Date.now(),
            name: name || url,
            url: url,
            status: 'online', // Initialer Status
            lastCheck: new Date().toLocaleTimeString()
        };

        monitors.push(newMonitor);
        saveToStorage();
        renderDashboard();
    }

    function addToFavorites(url, name) {
        if (!favorites.some(f => f.url === url)) {
            favorites.push({ url, name, status: 'online' });
            saveToStorage();
            renderDashboard(); // Re-Render für Button-Status
            updateFavorites();
        }
    }

    function removeFavorite(url) {
        favorites = favorites.filter(f => f.url !== url);
        saveToStorage();
        renderDashboard(); // Schaltet Buttons wieder frei
        updateFavorites();
    }

    function updateFavorites() {
        const container = document.getElementById('favorites-container');
        container.innerHTML = '';
        
        favorites.forEach(fav => {
            // Instanzen zählen
            const instanceCount = monitors.filter(m => m.url === fav.url).length;
            const badge = instanceCount > 1 ? `<span class="instance-badge">${instanceCount}</span>` : '';

            const div = document.createElement('div');
            div.className = 'favorite-item';
            div.innerHTML = `
                <div class="fav-led-container">
                    <div class="status-led ${fav.status}"></div>
                    ${badge}
                </div>
                <span style="flex-grow:1; font-size: 0.85em;">${fav.name}</span>
                <button class="fav-btn" onclick="removeFavorite('${fav.url}')">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            container.appendChild(div);
        });
    }

    function renderDashboard() {
        const grid = document.getElementById('monitor-grid');
        grid.innerHTML = '';

        monitors.forEach(m => {
            const isFav = favorites.some(f => f.url === m.url);
            // Logik: Ausgrauen wenn Blau ODER bereits in Favoriten
            const favDisabled = (m.status === 'blue' || isFav);

            const card = document.createElement('div');
            card.className = 'monitor-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <span class="status-led ${m.status}"></span>
                    <button class="fav-btn ${isFav ? 'active' : ''}" 
                            ${favDisabled ? 'disabled' : ''} 
                            onclick="addToFavorites('${m.url}', '${m.name}')">
                        <i class="fas fa-star"></i>
                    </button>
                </div>
                <h4>${m.name}</h4>
                <small>${m.url}</small>
            `;
            grid.appendChild(card);
        });
        updateFavorites();
    }

    // Initialer Start
    renderDashboard();

    // Alle 30 Sek Status-Update (Dummy-Logik hier angedeutet)
    setInterval(() => {
        console.log("30s Update-Zyklus...");
        // Hier käme deine "heilige" Fetch-Logik rein
        renderDashboard();
    }, 30000);

</script>
</body>
</html>
