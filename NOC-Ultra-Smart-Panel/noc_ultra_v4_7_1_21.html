<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title id="head-title">NOC Ultra Smart Panel</title>

<style>
/* ========== CSS – bestehend & erweitert ========== */
:root {
    --bg-color: #111;
    --panel-bg: #1a1a1a;
    --text-color: #eee;
    --accent-red: #ff3030;
    --accent-green: #00ff88;
}

* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    padding: 20px;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Statischer Kopfbereich (scrollt nicht) */
.static-header {
    flex-shrink: 0;
}

.controls {
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 8px;
    width: 100%;
    max-width: 340px;
    background: #222;
    border: 1px solid #444;
    color: #fff;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    background: #333;
    color: #fff;
    border: 1px solid #555;
    transition: 0.3s;
}

button:hover { background: #444; }
button:disabled { opacity: 0.3; cursor: not-allowed; background: #222; }

/* Kompakter Toggle-Schalter (14px hoch) */
.switch {
    position: relative;
    display: inline-block;
    width: 32px;
    height: 14px;
    flex-shrink: 0;
}
.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: 0.2s;
    border-radius: 14px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 10px;
    width: 10px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: 0.2s;
    border-radius: 50%;
}
input:checked + .slider {
    background-color: #00aa55;
}
input:checked + .slider:before {
    transform: translateX(18px);
}
.switch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.switch-label {
    font-size: 9px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Favoriten-Box mit Collapse-Animation */
.favoritesBox {
    border: 1px solid #333;
    background: #151515;
    overflow-y: auto;
    padding: 8px;
    width: 100%;
    transition: max-height 0.4s ease-out, opacity 0.2s ease, padding 0.2s ease;
    max-height: 120px;
    opacity: 1;
}
.favoritesBox.collapsed {
    max-height: 0 !important;
    padding: 0 8px;
    opacity: 0;
    overflow-y: hidden;
    border-top: none;
    border-bottom: none;
}

.favoriteRow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    flex-wrap: nowrap;
}
.favoriteUrl {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
a.favoriteUrl {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
}
a.favoriteUrl:hover {
    text-decoration: underline;
}

/* Monitor-Container (scrollbar) */
.monitors-wrapper {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    margin-top: 10px;
}
.monitors-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
}
.monitors-spinner {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
}
.monitors-spinner canvas {
    width: 14px;
    height: 14px;
    display: block;
    border: none;
    background: transparent;
}
.monitors-count {
    font-size: 0.9em;
    background: #2a2a2a;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: normal;
}
#monitors {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 4px;
}

.panel {
    border: 1px solid #333;
    padding: 12px;
    background: var(--panel-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    transition: background 0.4s;
    gap: 15px;
}
.panel.changed { background: #2a2a00; }

.left { display: flex; gap: 10px; align-items: center; flex: 1 1 250px; }
.right { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; justify-content: flex-end; }

.led {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
}
.green { background: var(--accent-green); }
.yellow { background: #ffd000; }
.blue { background: #3aa0ff; }
.gray { background: #666; }
.red { background: var(--accent-red); animation: blink 1s infinite; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

.status { font-size: 12px; color: #aaa; }
.stats { font-size: 11px; color: #888; }

canvas { background: #000; border: 1px solid #333; max-width: 280px; width: 100%; height: auto; }

/* Neuer, moderner Tooltip für Titel (unten, für Touch) */
.title-with-hover {
    position: relative;
    display: inline-block;
    cursor: help;
    outline: none;
}
.title-with-hover .version-tooltip {
    visibility: hidden;
    opacity: 0;
    background-color: #222;
    color: #ffd966;
    text-align: center;
    padding: 4px 8px;
    border-radius: 6px;
    position: absolute;
    bottom: auto;
    top: 100%;
    left: 0;
    margin-top: 6px;
    white-space: nowrap;
    font-size: 11px;
    font-family: monospace;
    z-index: 100;
    border: 1px solid #555;
    pointer-events: none;
    transition: opacity 0.2s, visibility 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.title-with-hover:hover .version-tooltip,
.title-with-hover:focus .version-tooltip,
.title-with-hover:active .version-tooltip {
    visibility: visible;
    opacity: 1;
}

.fav-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 600px;
}
.fav-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
}
.fav-spinner {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
}
.fav-spinner canvas {
    width: 14px;
    height: 14px;
    display: block;
    border: none;
    background: transparent;
}
.fav-counters {
    font-size: 0.9em;
    background: #2a2a2a;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: normal;
}

@media (max-width: 600px) {
    body { padding: 10px; }
    .panel { flex-direction: column; align-items: stretch; }
    .right { justify-content: space-between; border-top: 1px solid #333; padding-top: 10px; }
    canvas { max-width: 100%; }
    input { max-width: 100%; }
    .controls { flex-direction: column; align-items: stretch; }
    .switch-container { align-items: flex-start; }
    .monitors-header { flex-wrap: wrap; }
    .title-with-hover .version-tooltip {
        white-space: normal;
        max-width: 200px;
        word-break: keep-all;
    }
}
</style>
</head>
<body>

<div class="static-header">
    <div id="cpu-mini" style="position: fixed; top: 8px; right: 12px; width: 64px; height: 10px; background: #111; border: 1px solid #222; border-radius: 3px; overflow: hidden; z-index: 99999; display: none;"></div>

    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 15px;">
        <h2 id="ui-title" class="title-with-hover" tabindex="0" style="margin:0;">
            NOC Ultra Smart Panel
            <span class="version-tooltip">v4.7.1.21</span>
        </h2>
        <div id="cpu-stress" style="width:92px; height:18px; background:#111; border:1px solid #444; border-radius:4px; overflow:hidden; position:relative;">
            <canvas id="cpu-canvas" width="92" height="18"></canvas>
            <div id="cpu-label" style="position:absolute; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; font-family:monospace; font-size:10px; font-weight:bold; color:#ddd; text-shadow:0 0 4px #000;">CPU</div>
        </div>
    </div>

    <div class="controls">
        <input id="urlInput" placeholder="https://example.com">
        <div class="switch-container">
            <span class="switch-label">Auto-Fav</span>
            <label class="switch" title="Auto-Favorite: Gültige URLs werden automatisch zu den Favoriten hinzugefügt">
                <input type="checkbox" id="autoFavToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <button id="ui-btn-add" disabled>Add Monitor</button>
    </div>

    <div class="controls" style="flex-direction: column; align-items: stretch;">
        <div class="fav-container" id="favContainer">
            <div class="fav-header">
                <div class="fav-spinner"><canvas id="favSpinnerCanvas" width="14" height="14"></canvas></div>
                <b>Favoriten</b>
                <span id="favCounters" class="fav-counters">(0 | 0)</span>
            </div>
            <div class="favoritesBox" id="favoritesList"></div>
        </div>
    </div>
</div>

<!-- Monitor-Bereich mit eigener Überschrift, dynamischem Spinner und Zähler -->
<div class="monitors-wrapper">
    <div class="monitors-header">
        <div class="monitors-spinner"><canvas id="monitorSpinnerCanvas" width="14" height="14"></canvas></div>
        <b>Monitore</b>
        <span id="monitorCount" class="monitors-count">(0)</span>
    </div>
    <div id="monitors"></div>
</div>

<script>
(function(){
  "use strict";

  let monitors = [];
  let intervalMs = 5000;
  const minStepMs = 200;
  let resortTimer = null;
  let favIntervals = [];

  // Dynamischer Spinner für Monitore
  let monitorSpinnerCtx = null;
  let monitorSpinnerAnimationId = null;
  let currentCycleDuration = intervalMs;   // aktuelle Zyklusdauer in ms
  let cycleStartTimestamp = 0;

  // Spinner für Favoriten (bleibt beim 5s-Takt, da fest)
  let favSpinnerStep = 0;
  let favSpinnerInterval = null;
  const favSpinnerCanvas = document.getElementById('favSpinnerCanvas');
  let favSpinnerCtx = null;

  const monitorSpinnerCanvas = document.getElementById('monitorSpinnerCanvas');
  const monitorCountSpan = document.getElementById('monitorCount');

  // Collapse Timer
  let collapseTimer = null;
  const favContainer = document.getElementById('favContainer');
  const favBox = document.getElementById('favoritesList');

  const translations = {
    de: { add: "Hinzufügen", favs: "Favoriten", placeholder: "URL eingeben...", err_url: "ungültig", err_net: "Netzwerkfehler", err_empty: "URL leer", err_offline: "kein Netzwerk", online: "OK", loading: "init", start: "Start" },
    en: { add: "Add Monitor", favs: "Favorites", placeholder: "Enter URL...", err_url: "invalid", err_net: "Network Error", err_empty: "URL empty", err_offline: "no network", online: "OK", loading: "init", start: "Start" }
  };
  const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
  const t = translations[userLang] || translations.en;

  let urlInput, btnAdd, monitorsContainer, cpuContainer;
  let favCountersSpan = null;
  let autoFavToggle = null;

  // ========== Spinner für Favoriten (fest 5s Schritt, 6 Schritte = 30s) ==========
  function drawFavSpinnerSegment(step) {
    if (!favSpinnerCtx) return;
    const w = 14, h = 14;
    favSpinnerCtx.clearRect(0, 0, w, h);
    favSpinnerCtx.beginPath();
    favSpinnerCtx.arc(w/2, h/2, w/2 - 1, 0, 2 * Math.PI);
    favSpinnerCtx.fillStyle = '#333';
    favSpinnerCtx.fill();
    favSpinnerCtx.strokeStyle = '#666';
    favSpinnerCtx.lineWidth = 1;
    favSpinnerCtx.stroke();

    if (step === 0) return;
    const anglePerStep = (Math.PI * 2) / 6;
    const startAngle = -Math.PI / 2;
    const endAngle = startAngle + anglePerStep * step;
    favSpinnerCtx.beginPath();
    favSpinnerCtx.moveTo(w/2, h/2);
    favSpinnerCtx.arc(w/2, h/2, w/2 - 1, startAngle, endAngle);
    favSpinnerCtx.fillStyle = '#00aa55';
    favSpinnerCtx.fill();
  }

  function startFavSpinner() {
    if (favSpinnerInterval) clearInterval(favSpinnerInterval);
    favSpinnerStep = 0;
    drawFavSpinnerSegment(0);
    favSpinnerInterval = setInterval(() => {
      favSpinnerStep = (favSpinnerStep + 1) % 6;
      drawFavSpinnerSegment(favSpinnerStep);
    }, 5000);
  }

  // ========== Dynamischer Monitor-Spinner (volle Umdrehung = currentCycleDuration) ==========
  function drawMonitorSpinner(progress) {
    if (!monitorSpinnerCtx) return;
    const w = 14, h = 14;
    monitorSpinnerCtx.clearRect(0, 0, w, h);
    // Hintergrundkreis
    monitorSpinnerCtx.beginPath();
    monitorSpinnerCtx.arc(w/2, h/2, w/2 - 1, 0, 2 * Math.PI);
    monitorSpinnerCtx.fillStyle = '#333';
    monitorSpinnerCtx.fill();
    monitorSpinnerCtx.strokeStyle = '#666';
    monitorSpinnerCtx.lineWidth = 1;
    monitorSpinnerCtx.stroke();

    if (progress <= 0) return;
    const endAngle = -Math.PI / 2 + (Math.PI * 2 * progress);
    monitorSpinnerCtx.beginPath();
    monitorSpinnerCtx.moveTo(w/2, h/2);
    monitorSpinnerCtx.arc(w/2, h/2, w/2 - 1, -Math.PI / 2, endAngle);
    monitorSpinnerCtx.fillStyle = '#00aa55';
    monitorSpinnerCtx.fill();
  }

  function startMonitorSpinnerAnimation(durationMs) {
    if (monitorSpinnerAnimationId) cancelAnimationFrame(monitorSpinnerAnimationId);
    currentCycleDuration = durationMs;
    cycleStartTimestamp = performance.now();
    function animate(now) {
      const elapsed = now - cycleStartTimestamp;
      let progress = Math.min(1, elapsed / currentCycleDuration);
      drawMonitorSpinner(progress);
      if (progress < 1) {
        monitorSpinnerAnimationId = requestAnimationFrame(animate);
      } else {
        // Zyklus beendet, Spinner auf 1 (voll) und dann sofort auf 0 zurücksetzen? Besser kurz voll halten?
        drawMonitorSpinner(1);
        // Für den nächsten Zyklus wird beim nächsten scheduleCycle neu gestartet
        monitorSpinnerAnimationId = null;
      }
    }
    monitorSpinnerAnimationId = requestAnimationFrame(animate);
  }

  // Wird aufgerufen, wenn ein neuer Zyklus beginnt (in scheduleCycle)
  function resetMonitorSpinnerForNewCycle(newDuration) {
    startMonitorSpinnerAnimation(newDuration);
  }

  // ========== Favoriten Collapse (unverändert) ==========
  function collapseFavoritesBox() {
    if (favBox && !favBox.classList.contains('collapsed')) favBox.classList.add('collapsed');
  }
  function expandFavoritesBox() {
    if (favBox && favBox.classList.contains('collapsed')) favBox.classList.remove('collapsed');
  }
  function resetCollapseTimer() {
    if (collapseTimer) clearTimeout(collapseTimer);
    collapseTimer = setTimeout(() => collapseFavoritesBox(), 5000);
  }
  function handleContainerMouseEnter() {
    expandFavoritesBox();
    if (collapseTimer) clearTimeout(collapseTimer);
  }
  function handleContainerMouseLeave() {
    resetCollapseTimer();
  }
  function handleBoxMouseEnter() {
    expandFavoritesBox();
    if (collapseTimer) clearTimeout(collapseTimer);
  }
  function handleBoxMouseLeave() {
    resetCollapseTimer();
  }

  // ========== Monitor-Logik (unverändert) ==========
  function isValidURL(str){
    try { const u=new URL(str); return u.protocol==="http:"||u.protocol==="https:"; }
    catch { return false; }
  }
  function getDomain(url){ try { return new URL(url).hostname; } catch { return ""; } }
  function schemaWeight(url){ try { const p = new URL(url).protocol; return p==="http:" ? 0 : 1; } catch { return 2; } }
  function segmentWeight(domain){ if(domain.startsWith("127.")) return 0; if(domain.startsWith("192.168.")) return 1; return 2; }
  function ipCompare(a,b){
    const ip2num = ip => ip.split('.').map(Number);
    const aNum = ip2num(a), bNum = ip2num(b);
    for(let i=0;i<4;i++) if(aNum[i]!==bNum[i]) return aNum[i]-bNum[i];
    return 0;
  }
  function statePriority(s){ return {red:0,yellow:1,blue:2,gray:3,green:4}[s] ?? 5; }

  function updateFavCounters() {
    if (!favCountersSpan) return;
    const favs = loadFavorites();
    const favCount = favs.length;
    const activeFavMonitors = monitors.filter(m => favs.includes(m.url)).length;
    favCountersSpan.textContent = `(${favCount} | ${activeFavMonitors})`;
  }

  function updateMonitorCount() {
    if (monitorCountSpan) monitorCountSpan.textContent = `(${monitors.length})`;
  }

  function setState(m, state, text){
    if(m.state!==state){
      m.div.classList.add("changed");
      setTimeout(()=>m.div.classList.remove("changed"),400);
    }
    m.state = state;
    m.led.className = "led "+state;
    m.statusDiv.textContent = text;
    sortPanels(false);
  }

  function drawGraph(m){
    const ctx = m.canvas.getContext("2d");
    const w = m.canvas.width, h = m.canvas.height;
    ctx.clearRect(0,0,w,h);
    if(m.history.length<2) return;
    const values = m.history;
    const min = Math.min(...values);
    const max = Math.max(...values);
    const avg = Math.round(values.reduce((a,b)=>a+b,0)/values.length);
    const range = max-min || 1;
    ctx.strokeStyle="#111";
    for(let i=1;i<=3;i++){ const y=(h-20)*(i/4); ctx.beginPath(); ctx.moveTo(30,y); ctx.lineTo(w-5,y); ctx.stroke(); }
    const activeInterval = Math.max(intervalMs, monitors.length*minStepMs);
    const totalSec = Math.round(values.length*(activeInterval/1000));
    for(let s=10;s<totalSec;s+=10){ const x=30+(s/totalSec)*(w-40); ctx.beginPath(); ctx.moveTo(x,5); ctx.lineTo(x,h-20); ctx.stroke(); }
    ctx.strokeStyle="#333";
    ctx.beginPath();
    ctx.moveTo(30,5); ctx.lineTo(30,h-20); ctx.lineTo(w-5,h-20); ctx.stroke();
    ctx.fillStyle="#777"; ctx.font="10px Arial";
    ctx.fillText(max+" ms",2,12); ctx.fillText(min+" ms",2,h-22); ctx.fillText(totalSec+"s",w-40,h-5);
    ctx.beginPath();
    values.forEach((v,i)=>{
      const x=30+i*((w-40)/values.length);
      const y=(h-20)-((v-min)/range)*(h-30);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle="#00ff88"; ctx.stroke();
    m.statsDiv.textContent="Min:"+min+" | Max:"+max+" | Avg:"+avg+" ms";
  }

  async function checkMonitor(m){
    if(!m.url){ setState(m,"gray",t.err_empty); return; }
    if(!isValidURL(m.url)){ setState(m,"blue",t.err_url); return; }
    if(!navigator.onLine){ setState(m,"red",t.err_offline); return; }
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(),3000);
    const start = performance.now();
    try{
      await fetch(m.url,{method:"GET",mode:"no-cors",cache:"no-store",signal:controller.signal});
      const time = Math.round(performance.now()-start);
      m.history.push(time); if(m.history.length>120) m.history.shift();
      drawGraph(m);
      setState(m,"green",t.online+" "+time+" ms");
    }catch(e){
      if(e.name==="AbortError") setState(m,"yellow","Timeout");
      else setState(m,"red",t.err_net+(e.message ? " ("+e.message+")" : ""));
    }
    clearTimeout(timeout);
  }

  function createMonitor(url){
    const div = document.createElement("div"); div.className="panel";
    const left = document.createElement("div"); left.className="left";
    const led = document.createElement("div"); led.className="led gray";
    const text = document.createElement("div");
    text.innerHTML=`<div>${url||"(leer)"}</div><div class="status">${t.loading}</div><div class="stats"></div>`;
    const statusDiv = text.querySelector(".status");
    const statsDiv = text.querySelector(".stats");
    left.appendChild(led); left.appendChild(text);
    const right = document.createElement("div");
    const canvas = document.createElement("canvas"); canvas.width=280; canvas.height=90;
    const btnFav = document.createElement("button"); btnFav.textContent="★"; btnFav.disabled = !isValidURL(url) || loadFavorites().includes(url);
    const btnDel = document.createElement("button"); btnDel.textContent="✖";
    right.appendChild(canvas); right.appendChild(btnFav); right.appendChild(btnDel);
    div.appendChild(left); div.appendChild(right);
    monitorsContainer.appendChild(div);
    const monitor = { url, div, led, statusDiv, statsDiv, canvas, history:[], state:"gray", startTime:Date.now(), favButton: btnFav };
    btnDel.onclick = () => { 
      monitors = monitors.filter(x=>x!==monitor); 
      div.remove(); 
      saveState(); 
      triggerGreenResort();
      updateFavCounters();
      updateMonitorCount();
    };
    btnFav.onclick = () => { addFavorite(url); btnFav.disabled=true; };
    return monitor;
  }

  function compareMonitors(a,b){
    const sp = statePriority(a.state)-statePriority(b.state);
    if(sp!==0) return sp;
    if(a.state==="green" && b.state==="green"){
      const ua = new URL(a.url), ub = new URL(b.url);
      const schemaDiff = schemaWeight(a.url)-schemaWeight(b.url); if(schemaDiff!==0) return schemaDiff;
      const da = ua.hostname, db = ub.hostname;
      const segDiff = segmentWeight(da)-segmentWeight(db); if(segDiff!==0) return segDiff;
      const ipRegex = /^\d+\.\d+\.\d+\.\d+$/;
      if(ipRegex.test(da) && ipRegex.test(db)) return ipCompare(da,db);
      return da.localeCompare(db);
    }
    return 0;
  }

  function sortPanels(applyGreenGrouping){
    monitors.sort(compareMonitors);
    monitors.forEach(m => monitorsContainer.appendChild(m.div));
  }
  function triggerGreenResort(){
    if(resortTimer) clearTimeout(resortTimer);
    resortTimer = setTimeout(()=>{ sortPanels(true); },30000);
  }

  function updateAllMonitorFavButtons() {
    const favs = loadFavorites();
    monitors.forEach(mon => {
      if (mon.favButton) mon.favButton.disabled = !isValidURL(mon.url) || favs.includes(mon.url);
    });
  }
  function updateFavoriteRow(url, ledElement, badgeElement) {
    const count = monitors.filter(m => m.url === url).length;
    const monitor = monitors.find(m => m.url === url);
    ledElement.className = monitor ? monitor.led.className : "led gray";
    badgeElement.textContent = "×"+count;
    badgeElement.style.visibility = count > 1 ? "visible" : "hidden";
  }

  function loadFavorites(){ return JSON.parse(localStorage.getItem("noc_favorites")||"[]"); }
  function saveFavorites(list){ localStorage.setItem("noc_favorites",JSON.stringify(list)); }

  function refreshFavoritesUI(){
    favIntervals.forEach(id => clearInterval(id));
    favIntervals = [];
    const container=document.getElementById("favoritesList");
    container.innerHTML="";
    const favs = loadFavorites().sort((a,b)=>{
      const ua = new URL(a), ub = new URL(b);
      const schemaDiff = schemaWeight(a)-schemaWeight(b); if(schemaDiff!==0) return schemaDiff;
      const da = ua.hostname, db = ub.hostname;
      const segDiff = segmentWeight(da)-segmentWeight(db); if(segDiff!==0) return segDiff;
      const ipRegex = /^\d+\.\d+\.\d+\.\d+$/;
      if(ipRegex.test(da) && ipRegex.test(db)) return ipCompare(da,db);
      return da.localeCompare(db);
    });
    favs.forEach(url=>{
      const row = document.createElement("div"); row.className="favoriteRow";
      const favLed = document.createElement("div"); favLed.className="led gray"; favLed.style.marginLeft="0px";
      const favStart = document.createElement("button"); favStart.textContent=t.start;
      favStart.onclick = () => {
        createAndStart(url);
        updateFavoriteRow(url, favLed, badge);
        updateFavCounters();
      };
      const favDel = document.createElement("button"); favDel.textContent="✖";
      favDel.onclick = () => {
        const list = loadFavorites().filter(f => f !== url);
        saveFavorites(list);
        refreshFavoritesUI();
        updateAllMonitorFavButtons();
        updateFavCounters();
      };
      const icon = document.createElement("img"); icon.style.width="16px"; icon.style.height="16px"; icon.style.borderRadius="2px"; icon.style.margin="0 4px";
      icon.src="https://www.google.com/s2/favicons?sz=32&domain="+encodeURIComponent(url);
      icon.onerror=()=>{ icon.src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><rect width='16' height='16' fill='%23666'/></svg>"; };
      const link = document.createElement("a");
      link.href = url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = url;
      link.className = "favoriteUrl";
      const badge = document.createElement("span");
      badge.style.cssText="font-size:10px;background:#333;color:#aaa;border-radius:8px;padding:1px 5px;min-width:28px;display:inline-block;text-align:center;visibility:hidden;";
      row.appendChild(favLed); row.appendChild(badge); row.appendChild(favStart); row.appendChild(favDel); row.appendChild(icon); row.appendChild(link);
      container.appendChild(row);
      const id = setInterval(()=>{
        const mon = monitors.find(x=>x.url===url);
        favLed.className = mon ? mon.led.className : "led gray";
        const count = monitors.filter(x=>x.url===url).length;
        badge.textContent = "×"+count;
        badge.style.visibility = count>1 ? "visible" : "hidden";
      },30000);
      favIntervals.push(id);
    });
    updateFavCounters();
  }

  function addFavorite(url){
    if(!isValidURL(url)) return;
    const favs = loadFavorites();
    if(!favs.includes(url)){ favs.push(url); saveFavorites(favs); refreshFavoritesUI(); updateFavCounters(); }
  }

  function saveState(){ localStorage.setItem("noc_monitors",JSON.stringify(monitors.map(m=>m.url))); }
  function loadState(){ 
    JSON.parse(localStorage.getItem("noc_monitors")||"[]").forEach(createAndStart);
    updateMonitorCount();
  }

  // Zentrale Scheduling-Funktion – hier wird die aktuelle Zyklusdauer berechnet und der Spinner gestartet
  function scheduleCycle(){
    if(monitors.length===0){ setTimeout(scheduleCycle,1000); return; }
    const minFullCycle = monitors.length * minStepMs;
    const activeInterval = Math.max(intervalMs, minFullCycle);
    const step = activeInterval / monitors.length;

    // Starte den Monitor-Spinner mit der aktuellen Zyklusdauer
    resetMonitorSpinnerForNewCycle(activeInterval);

    monitors.forEach((m,i)=>{ setTimeout(()=>checkMonitor(m), i*step); });
    setTimeout(() => scheduleCycle(), activeInterval);
  }

  function createAndStart(url){
    const m = createMonitor(url);
    monitors.push(m);
    checkMonitor(m);
    saveState();
    triggerGreenResort();
    updateAllMonitorFavButtons();   // ★-Button ggf. deaktivieren (wichtig für Auto-Fav)
    updateFavCounters();
    updateMonitorCount();
  }

  function initCpuIndicator(){
    const container = document.getElementById('cpu-stress');
    const canvas    = document.getElementById('cpu-canvas');
    const label     = document.getElementById('cpu-label');
    if (!container || !canvas) return;
    const ctx = canvas.getContext('2d', { alpha: false });
    let busyHistory = [];
    const HISTORY_SIZE = 4;
    function drawBar(avgBusy) {
      ctx.clearRect(0, 0, 92, 18);
      ctx.fillStyle = '#181818';
      ctx.fillRect(0, 0, 92, 18);
      let color = '#388e3c';
      if (avgBusy >= 85) color = '#c62828';
      else if (avgBusy >= 70) color = '#f57c00';
      else if (avgBusy >= 55) color = '#fbc02d';
      const width = Math.floor((avgBusy / 100) * 89) + 3;
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, width, 18);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(0, 0, width, 3);
      label.textContent = avgBusy >= 85 ? 'CRIT' : avgBusy >= 70 ? 'HIGH' : 'LOAD';
      label.style.color = avgBusy >= 75 ? '#fff' : '#ddd';
    }
    function measureBusyLoop(){
      const testMs = 35;
      const start = performance.now();
      let dummy = 0;
      while (performance.now() - start < testMs) dummy += Math.sin(dummy);
      const elapsed = performance.now() - start;
      return Math.min(98, Math.max(5, Math.round(100 - (testMs / elapsed * 100))));
    }
    function measureIdleBusy(callback){
      const start = performance.now();
      window.requestIdleCallback((deadline) => {
        const delay = performance.now() - start;
        if (deadline.didTimeout || delay > 200 * 0.8) 
          callback(80 + Math.min(20, (delay / 200) * 20));
        else if (deadline.timeRemaining() < 10) 
          callback(50 + (10 - deadline.timeRemaining()) * 5);
        else callback(0);
      }, { timeout: 200 });
    }
    function getMemoryBoost(){
      if ('memory' in performance) {
        const { usedJSHeapSize, jsHeapSizeLimit } = performance.memory;
        const heapUsage = (usedJSHeapSize / jsHeapSizeLimit) * 100;
        return heapUsage > 80 ? 20 : heapUsage > 60 ? 10 : 0;
      }
      return 0;
    }
    function updateCpuMini(){
      measureIdleBusy((idleBusy) => {
        const loopBusy = measureBusyLoop();
        const memoryBoost = getMemoryBoost();
        let currentBusy = Math.max(idleBusy, loopBusy) + memoryBoost;
        busyHistory.push(currentBusy);
        if (busyHistory.length > HISTORY_SIZE) busyHistory.shift();
        const avgBusy = Math.round(busyHistory.reduce((a,b) => a + b, 0) / busyHistory.length);
        if(avgBusy>=49) container.style.display='block';  
        else container.style.display='none';
        drawBar(avgBusy);
      });
    }
    updateCpuMini();
    setInterval(updateCpuMini, 3000);
  }

  function init(){
    urlInput=document.getElementById('urlInput');
    btnAdd=document.getElementById('ui-btn-add');
    monitorsContainer=document.getElementById('monitors');
    cpuContainer=document.getElementById('cpu-mini');
    favCountersSpan = document.getElementById('favCounters');
    autoFavToggle = document.getElementById('autoFavToggle');

    if (favSpinnerCanvas) favSpinnerCtx = favSpinnerCanvas.getContext('2d');
    if (monitorSpinnerCanvas) monitorSpinnerCtx = monitorSpinnerCanvas.getContext('2d');
    startFavSpinner();
    // Monitor-Spinner startet beim ersten scheduleCycle

    if (favContainer) {
      favContainer.addEventListener('mouseenter', handleContainerMouseEnter);
      favContainer.addEventListener('mouseleave', handleContainerMouseLeave);
    }
    if (favBox) {
      favBox.addEventListener('mouseenter', handleBoxMouseEnter);
      favBox.addEventListener('mouseleave', handleBoxMouseLeave);
      resetCollapseTimer();
    }

    urlInput.placeholder=t.placeholder; btnAdd.textContent=t.add; 
    document.getElementById('head-title').textContent='NOC Ultra Smart Panel';

    urlInput.addEventListener('input',()=>{ btnAdd.disabled = urlInput.value.trim() === ''; });
    urlInput.addEventListener('blur',()=>{
      const v=urlInput.value.trim();
      if(v && !v.startsWith("http://") && !v.startsWith("https://")){ urlInput.value="https://"+v; btnAdd.disabled=false; }
    });
    btnAdd.addEventListener('click',()=>{
      const url=urlInput.value.trim();
      urlInput.value='';
      btnAdd.disabled=true;
      createAndStart(url);
      if (autoFavToggle && autoFavToggle.checked && isValidURL(url)) {
        addFavorite(url);
      }
    });

    loadState(); refreshFavoritesUI(); scheduleCycle();
    initCpuIndicator();
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();

  window.__NOC_DEBUG__ = {
    get monitors(){ return monitors; },
    t,
    createAndStart
  };
})();
</script>
