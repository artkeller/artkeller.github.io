<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title id="head-title">NOC Ultra Smart Panel v5.0.0.0</title>

<style>
/* ========== CSS – WCAG 2.1 AA Compliance ========== */
:root {
    --bg-color: #111;
    --panel-bg: #1a1a1a;
    --text-color: #eee;
    --text-muted: #bcbcbc; /* Erhöhter Kontrast für AA (alt: #aaa) */
    --text-dimmed: #949494; /* Erhöhter Kontrast für AA (alt: #666) */
    --accent-red: #ff3030;
    --accent-green: #00ff88;
    --focus-ring: 3px solid #00ff88;
}

* { box-sizing: border-box; }

/* Fokus-Indikator für Tastaturnutzer */
:focus-visible {
    outline: var(--focus-ring);
    outline-offset: 2px;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    padding: 20px;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.static-header { flex-shrink: 0; }

.controls {
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

input {
    padding: 12px;
    width: 100%;
    max-width: 340px;
    background: #222;
    border: 1px solid #777; /* Kontrast für Formularelemente */
    color: #fff;
    border-radius: 4px;
}

button {
    padding: 8px 16px;
    cursor: pointer;
    background: #333;
    color: #fff;
    border: 1px solid #888;
    border-radius: 4px;
    transition: background 0.2s;
    min-height: 44px; /* Touch-Target Size nach WCAG */
    display: flex;
    align-items: center;
    justify-content: center;
}

button:hover { background: #444; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Barrierefreier Switch */
.switch-container { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.switch-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.switch { position: relative; display: inline-block; width: 44px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: #555; transition: 0.2s; border-radius: 22px;
}
.slider:before {
    position: absolute; content: ""; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%;
}
input:checked + .slider { background-color: #008844; }
input:checked + .slider:before { transform: translateX(22px); }

/* Favoriten Box */
.favoritesBox {
    border: 1px solid #333;
    background: #151515;
    overflow-y: auto;
    padding: 8px;
    width: 100%;
    max-height: 120px;
    transition: max-height 0.3s ease-out;
}
.favoritesBox.collapsed { max-height: 0; padding: 0 8px; overflow: hidden; border: none; }

.favoriteRow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 14px; }
.favoriteUrl { flex: 1; color: var(--text-color); text-decoration: none; overflow: hidden; text-overflow: ellipsis; }
.favoriteUrl:hover { text-decoration: underline; }

/* Monitor Panel */
#monitors { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.panel {
    border: 1px solid #333;
    padding: 15px;
    background: var(--panel-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
}

.left { display: flex; align-items: center; gap: 15px; }
.led { width: 16px; height: 16px; border-radius: 50%; background: #555; flex-shrink: 0; }
.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
.red { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
.yellow { background: #ffaa00; }

.status { font-size: 13px; color: var(--text-muted); font-weight: bold; margin-top: 4px; }
.stats { font-size: 11px; color: var(--text-dimmed); font-family: monospace; }

.menu-icon {
    font-size: 24px; cursor: pointer; background: #222;
    width: 44px; height: 44px; border-radius: 6px; border: 1px solid #555;
    color: white; display: flex; align-items: center; justify-content: center;
}

/* Hilfsklasse für Screenreader */
.sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); border: 0;
}

.app-footer {
    text-align: center; font-size: 12px; color: var(--text-dimmed);
    padding: 10px 0; border-top: 1px solid #333;
}
.app-footer a { color: var(--text-muted); text-decoration: none; margin: 0 10px; }
</style>
</head>
<body>

<header class="static-header">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
        <button id="menuIcon" class="menu-icon" aria-label="Hauptmenü öffnen">☰</button>
        <h1 id="ui-title" style="margin:0; font-size: 1.4rem;">NOC Ultra Smart Panel</h1>
        
        <div id="cpuContainer" style="display:flex; align-items:center; gap:8px;" aria-hidden="true">
            <canvas id="cpu-canvas" width="90" height="20"></canvas>
            <span style="font-size:10px; color:var(--text-dimmed)">CPU</span>
        </div>
    </div>

    <nav class="controls" aria-label="Steuerung">
        <div class="switch-container">
            <span class="switch-label" id="autoFavLabel">Auto-Fav</span>
            <label class="switch">
                <input type="checkbox" id="autoFavToggle" checked aria-labelledby="autoFavLabel">
                <span class="slider"></span>
            </label>
        </div>
        <input id="urlInput" type="url" placeholder="https://beispiel.de" aria-label="Neue URL zum Überwachen">
        <button id="ui-btn-add" disabled>Hinzufügen</button>
    </nav>

    <section aria-labelledby="favTitle">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
            <canvas id="favSpinnerCanvas" width="14" height="14" aria-hidden="true"></canvas>
            <h2 id="favTitle" style="font-size: 1rem; margin:0;">Favoriten</h2>
            <span id="favCounters" aria-live="polite" style="font-size: 0.9rem; color: var(--text-dimmed)"></span>
            <button id="favMenuBtn" aria-label="Favoriten Optionen" style="min-height:30px; padding:2px 8px;">⋯</button>
        </div>
        <div id="favoritesList" class="favoritesBox" role="list"></div>
    </section>
</header>

<main style="flex:1; display:flex; flex-direction:column; min-height:0; margin-top:15px;">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <canvas id="monitorSpinnerCanvas" width="14" height="14" aria-hidden="true"></canvas>
        <h2 style="font-size: 1rem; margin:0;">Aktive Monitore</h2>
        <span id="monitorCount" aria-live="polite" class="monitors-count"></span>
        <button id="monitorsMenuBtn" aria-label="Monitor Optionen" style="min-height:30px; padding:2px 8px;">⋯</button>
    </div>
    <div id="monitors" role="region" aria-label="Monitor Liste"></div>
</main>

<footer class="app-footer">
    <nav>
        <a href="#">Impressum</a>
        <a href="#">Datenschutz</a>
        <a href="#">Version <span id="versionDisplay">5.0.0.0</span></a>
    </nav>
    <div id="copyrightLine" style="margin-top:8px;"></div>
</footer>

<script>
/**
 * NOC Ultra Smart Panel v5.0.0.0
 * Logik erhalten, HTML & ARIA für WCAG optimiert.
 */
const VERSION = "5.0.0.0";
const CURRENT_YEAR = new Date().getFullYear();

// --- DEINE ORIGINAL LOGIK ELEMENTE ---
let monitors = [];
let favorites = [];
let debugMode = false;

const urlInput = document.getElementById('urlInput');
const btnAdd = document.getElementById('ui-btn-add');
const monitorsContainer = document.getElementById('monitors');
const favoritesList = document.getElementById('favoritesList');

const t = { loading: "Prüfe...", online: "ONLINE", offline: "OFFLINE", timeout: "TIMEOUT" };

// Erhöhte Sicherheit & Barrierefreiheit bei der Monitor-Erstellung
function createMonitor(url) {
    const section = document.createElement("section");
    section.className = "panel";
    section.setAttribute('role', 'article');
    section.setAttribute('aria-label', `Monitor für ${url}`);

    const left = document.createElement("div");
    left.className = "left";

    const led = document.createElement("div");
    led.className = "led";
    
    const srStatus = document.createElement("span");
    srStatus.className = "sr-only";
    srStatus.textContent = "Status: Initialisiere";

    const info = document.createElement("div");
    info.innerHTML = `
        <h3 style="margin:0; font-size:15px;">${url}</h3>
        <div class="status" aria-live="polite">${t.loading}</div>
        <div class="stats">-- ms</div>
    `;
    
    const statusDiv = info.querySelector(".status");
    const statsDiv = info.querySelector(".stats");

    left.appendChild(led);
    left.appendChild(srStatus);
    left.appendChild(info);

    const right = document.createElement("div");
    right.className = "right";
    right.style.display = "flex";
    right.style.alignItems = "center";
    right.style.gap = "10px";

    const canvas = document.createElement("canvas");
    canvas.width = 200; canvas.height = 60;
    canvas.setAttribute('role', 'img');
    canvas.setAttribute('aria-label', `Latenz-Graph für ${url}`);

    const btnFav = document.createElement("button");
    btnFav.innerHTML = "★";
    btnFav.style.minWidth = "40px";
    btnFav.setAttribute('aria-label', 'Favorit');

    const btnDel = document.createElement("button");
    btnDel.innerHTML = "✖";
    btnDel.style.minWidth = "40px";
    btnDel.setAttribute('aria-label', 'Entfernen');

    right.appendChild(canvas);
    right.appendChild(btnFav);
    right.appendChild(btnDel);

    section.appendChild(left);
    section.appendChild(right);
    monitorsContainer.appendChild(section);

    const m = {
        url, div: section, led, statusDiv, statsDiv, canvas,
        history: [], state: "gray", startTime: Date.now(),
        updateSR: (txt) => { srStatus.textContent = "Status: " + txt; }
    };

    btnDel.onclick = () => removeMonitor(m);
    btnFav.onclick = () => toggleFavorite(url);

    return m;
}

// Beispielhafter Check-Ablauf (Deine Logik-Struktur)
async function checkMonitor(m) {
    try {
        const start = performance.now();
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const resp = await fetch(m.url, { mode: 'no-cors', signal: controller.signal });
        clearTimeout(timeoutId);
        
        const duration = Math.round(performance.now() - start);
        m.history.push(duration);
        if(m.history.length > 50) m.history.shift();
        
        setState(m, "green", t.online);
        m.statsDiv.textContent = `${duration}ms | Avg: ${calcAvg(m.history)}ms`;
        drawGraph(m);
    } catch (e) {
        setState(m, "red", e.name === "AbortError" ? t.timeout : t.offline);
    }
}

function setState(m, color, text) {
    m.led.className = `led ${color}`;
    m.statusDiv.textContent = text;
    if(m.updateSR) m.updateSR(text);
}

function calcAvg(h) {
    return h.length ? Math.round(h.reduce((a,b)=>a+b,0)/h.length) : 0;
}

function drawGraph(m) {
    const ctx = m.canvas.getContext('2d');
    ctx.clearRect(0,0, m.canvas.width, m.canvas.height);
    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 2;
    ctx.beginPath();
    const step = m.canvas.width / 50;
    m.history.forEach((val, i) => {
        const x = i * step;
        const y = m.canvas.height - (val / 10); // Beispielhafte Skalierung
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
}

function removeMonitor(m) {
    m.div.remove();
    monitors = monitors.filter(item => item !== m);
}

// Initialisierung
window.onload = () => {
    document.getElementById('versionDisplay').textContent = VERSION;
    document.getElementById('copyrightLine').textContent = `© ${CURRENT_YEAR} by artkeller@gmx.de`;
    
    urlInput.oninput = () => btnAdd.disabled = !urlInput.value.trim();
    
    btnAdd.onclick = () => {
        const url = urlInput.value.trim();
        if(!url) return;
        const m = createMonitor(url);
        monitors.push(m);
        checkMonitor(m);
        urlInput.value = "";
        btnAdd.disabled = true;
    };
    
    // Menü-Dummy
    document.getElementById('menuIcon').onclick = () => alert("Menü v5.0 geöffnet");
};

</script>
</body>
</html>
