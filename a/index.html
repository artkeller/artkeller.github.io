<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Echte GeoMap - No Lib - No Limit</title>
    <style>
        :root { --accent: #ef4444; }
        body { margin: 0; background: #020617; font-family: sans-serif; color: white; }
        
        #map-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Das Kachel-Netz (3x3 Kacheln decken DE bei Zoom 6 ab) */
        #tile-grid {
            display: grid;
            grid-template-columns: repeat(3, 256px);
            grid-template-rows: repeat(3, 256px);
            transform: scale(1.5); /* Damit es den Screen füllt */
            filter: saturate(0.6) brightness(0.7) invert(0.9) hue-rotate(180deg); /* Dark Mode Hack */
        }

        .tile { width: 256px; height: 256px; background-color: #111; }

        /* Overlay für Marker */
        #marker-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 768px; /* 3 * 256 */
            height: 768px;
            transform: translate(-50%, -50%) scale(1.5);
            pointer-events: none;
        }

        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            /* Berlin Position innerhalb des 3x3 Rasters bei Zoom 6 */
            left: 535px; 
            top: 275px;
        }

        .marker::after {
            content: "BERLIN DC";
            position: absolute;
            left: 25px;
            top: -5px;
            white-space: nowrap;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<header>
    <strong>OSM-Static-Grid (No Lib)</strong><br>
    Data Center Location: Berlin
</header>

<div id="map-viewport">
    <div id="tile-grid">
        <!-- Wir laden die Kacheln für Deutschland Zoom 6 (X=34-36, Y=21-23) -->
        <img class="tile" src="https://tile.openstreetmap.org/6/34/21.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/35/21.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/36/21.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/34/22.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/35/22.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/36/22.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/34/23.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/35/23.png">
        <img class="tile" src="https://tile.openstreetmap.org/6/36/23.png">
    </div>

    <div id="marker-layer">
        <div class="marker"></div>
    </div>
</div>

</body>
</html>
