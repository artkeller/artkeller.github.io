<!-- 
  Winziger CPU-Minigraph oben rechts – nur wenn Pressure API halbwegs brauchbar ist
  Sonst: komplett weg (kein DOM-Element)
-->
<div id="cpu-mini" style="
  position: fixed;
  top: 6px;
  right: 8px;
  width: 64px;
  height: 10px;
  background: #111;
  border: 1px solid #222;
  border-radius: 2px;
  overflow: hidden;
  z-index: 9999;
  display: none;           /* standardmäßig unsichtbar */
">*</div>

<script>
// ────────────────────────────────────────────────
// Sehr schlanker Canvas-Balken (kein Chart.js!)
const container = document.getElementById('cpu-mini');
const canvas = document.createElement('canvas');
canvas.width = 64;
canvas.height = 10;
const ctx = canvas.getContext('2d');
container.appendChild(canvas);

let usingPressure = false;
let lastValue = 0;

function drawBar(pct) {
  ctx.clearRect(0, 0, 64, 10);

  // Hintergrund (dunkel)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, 64, 10);

  // Farbiger Balken
  let color;
  if      (pct >= 90) color = '#c62828';
  else if (pct >= 75) color = '#f57c00';
  else if (pct >= 50) color = '#fbc02d';
  else                color = '#388e3c';

  const width = Math.round((pct / 100) * 64);
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, width, 10);

  // ganz dünner heller Rand oben/unten für bessere Sichtbarkeit
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(0, 0, width, 1);
  ctx.fillRect(0, 9, width, 1);
}

// ────────────────────────────────────────────────
// PressureObserver – mit "Brauchbarkeits-Check"
if ('PressureObserver' in window) {
  const observer = new PressureObserver(records => {
    if (records.length === 0) return;

    const state = records[records.length - 1].state;
    const map = {
      nominal:   25,
      fair:      55,
      serious:   82,
      critical:  96
    };

    const pct = map[state] || 0;

    // "halbwegs sinnvoll"-Heuristik:
    // Mindestens einmal "fair" oder höher innerhalb der ersten ~45 Sekunden
    // oder mehrmals nicht nur nominal
    if (pct >= 50 || lastValue >= 45) {
      usingPressure = true;
      container.style.display = 'block';
    }

    lastValue = pct;
    if (usingPressure) {
      drawBar(pct);
    }
  });

  // sampleInterval etwas höher → weniger Akku/CPU auf Mobile
  observer.observe('cpu', { sampleInterval: 4000 })
    .catch(() => {
      // Fehler → gar nichts anzeigen
      usingPressure = false;
    });

  // Timeout: Wenn nach 45 Sekunden immer noch nur nominal → als unbrauchbar einstufen
  setTimeout(() => {
    if (!usingPressure && lastValue <= 30) {
      // Android-Falle oder Desktop im Leerlauf → ausblenden
      container.style.display = 'none';
      observer.disconnect();
    }
  }, 45000);
}

// Fallback: gar nichts tun → Element bleibt unsichtbar
</script>
