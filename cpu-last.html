<!-- Debug-fähige Version: Widget immer sichtbar wenn DEBUG_MODE = true -->
<div id="cpu-mini" style="
  position: fixed;
  top: 6px;
  right: 8px;
  width: 80px;
  height: 14px;
  background: #111;
  border: 1px solid #333;
  border-radius: 3px;
  overflow: hidden;
  z-index: 99999;
  display: none;
  font-family: monospace;
  font-size: 9px;
  color: #777;
"></div>

<script>
// ────────────────────────────────────────────────
// === Debug-Schalter ===
const DEBUG_MODE = false;   // <--- hier auf true setzen zum Debuggen

// ────────────────────────────────────────────────
const container = document.getElementById('cpu-mini');
const canvas = document.createElement('canvas');
canvas.width = 80;
canvas.height = 14;
const ctx = canvas.getContext('2d');
container.appendChild(canvas);

const statusText = document.createElement('div');
statusText.style.position = 'absolute';
statusText.style.top = '0';
statusText.style.left = '0';
statusText.style.right = '0';
statusText.style.bottom = '0';
statusText.style.display = 'flex';
statusText.style.alignItems = 'center';
statusText.style.justifyContent = 'center';
statusText.style.pointerEvents = 'none';
container.appendChild(statusText);

function drawBar(pct, state = '', source = '') {
  ctx.clearRect(0, 0, 80, 14);

  // dunkler Hintergrund
  ctx.fillStyle = '#181818';
  ctx.fillRect(0, 0, 80, 14);

  // Balken
  let color = '#444';
  if (pct >= 90) color = '#c62828';
  else if (pct >= 75) color = '#f57c00';
  else if (pct >= 50) color = '#fbc02d';
  else if (pct >= 25) color = '#388e3c';
  else color = '#555';

  const width = Math.round((pct / 100) * 80);
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, width, 14);

  // Status-Text (nur im Debug-Modus sichtbar + Konsole)
  let displayText = source ? source : '?';
  if (state) displayText += ` ${state} ${Math.round(pct)}%`;

  statusText.textContent = displayText;
  statusText.style.color = pct > 70 ? '#fff' : '#aaa';

  console.log(`[CPU Pressure] ${source} | state=${state} | pct=${Math.round(pct)} | raw=${pct.toFixed(1)}`);
}

function showWidget() {
  container.style.display = 'block';
}

function hideWidget() {
  if (!DEBUG_MODE) {
    container.style.display = 'none';
  }
}

// ────────────────────────────────────────────────
let hasPressure = 'PressureObserver' in window;
let everSawNonNominal = false;
let sampleCount = 0;

if (hasPressure) {
  console.log("[CPU Debug] PressureObserver ist im Browser vorhanden");

  const observer = new PressureObserver(records => {
    sampleCount++;
    if (records.length === 0) return;

    const state = records[records.length - 1].state;
    const map = {
      nominal:   22,
      fair:      52,
      serious:   81,
      critical:  97
    };

    const pct = map[state] || 0;

    // Loggen IMMER (für Debug)
    console.log(`[Pressure #${sampleCount}] state=${state}, pct=${pct}`);

    if (state !== 'nominal') {
      everSawNonNominal = true;
    }

    // Entscheidung: Widget zeigen?
    if (DEBUG_MODE || everSawNonNominal || sampleCount > 8) {
      showWidget();
      drawBar(pct, state, 'Pressure');
    } else {
      hideWidget();
      drawBar(0, '', 'wait…');
    }
  });

  observer.observe('cpu', { sampleInterval: 3000 })
    .then(() => {
      console.log("[CPU Debug] observe('cpu') erfolgreich gestartet");
      if (DEBUG_MODE) showWidget();
    })
    .catch(err => {
      console.warn("[CPU Debug] observe('cpu') FEHLER:", err);
      hasPressure = false;
      if (DEBUG_MODE) {
        showWidget();
        drawBar(0, '', 'API Fehler');
      }
    });

  // Nach 60 Sekunden: wenn immer noch nur nominal → als unbrauchbar markieren
  setTimeout(() => {
    if (!everSawNonNominal && sampleCount > 5) {
      console.log("[CPU Debug] Nur nominal nach 60s → vermutlich unbrauchbar (z.B. Android)");
      if (!DEBUG_MODE) hideWidget();
      else drawBar(15, 'nominal', 'nur nominal');
    }
  }, 60000);

} else {
  console.log("[CPU Debug] PressureObserver existiert NICHT im Browser");
  if (DEBUG_MODE) {
    showWidget();
    drawBar(0, '', 'keine API');
  }
}

</script>
